<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dutty Brush | Workbench</title>
    
    <link rel="icon" type="image/jpeg" href="avatar.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; scroll-behavior: smooth; }
        .hero-gradient { background: radial-gradient(circle at center, #111111 0%, #050505 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); }
        .accent-red { color: #ff3e3e; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; backdrop-filter: blur(20px); overflow-y: auto; }
        
        .tag-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
        .filter-btn { 
            padding: 6px 14px; border-radius: 8px; font-size: 9px; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 0.05em; border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.02); color: #555; transition: all 0.2s ease;
        }
        .filter-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
        .filter-btn.active { background: #ff3e3e; color: white; border-color: #ff3e3e; }

        .forge-input { background: #000 !important; border: 1px solid rgba(255,255,255,0.2) !important; color: #fff !important; padding: 12px 16px; border-radius: 10px; outline: none; }
        .forge-input option { background: #000; color: #fff; }
        
        label { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em; color: #444; margin-bottom: 6px; display: block; }

        .project-viewer-img { width: 100%; height: auto; max-height: 450px; object-fit: contain; border-radius: 12px; background: #000; cursor: zoom-in; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .gallery-sub-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: zoom-in; opacity: 0.8; transition: opacity 0.2s; }

        .thumb-container { height: 340px; overflow: hidden; background: #000; position: relative; border-radius: 32px 32px 0 0; }
        .thumb-img { 
            width: 100%; height: 100%; object-fit: cover; object-position: top center; 
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0.7;
        }
        .group:hover .thumb-img { transform: scale(1.08); opacity: 1; }

        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; align-items: center; justify-content: center; padding: 40px; }
        #lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .dynamic-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: rgba(255,255,255,0.02); padding: 6px; border-radius: 12px; }
        .btn-add { background: #111; color: #fff; width: 28px; height: 28px; border-radius: 8px; font-size: 18px; line-height: 1; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="hero-gradient min-h-screen p-6 md:p-12">

    <div id="lightbox" onclick="this.style.display='none'"><img id="lightbox-img" src=""></div>

    <div id="project-modal" class="modal-overlay" onclick="closeModals()">
        <div class="max-w-6xl mx-auto my-12 p-6" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-8">
                <h2 id="view-title" class="text-3xl font-900 uppercase italic tracking-tighter"></h2>
                <button onclick="closeModals()" class="text-zinc-600 hover:text-white uppercase text-[10px] font-black tracking-widest">Close</button>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <div class="lg:col-span-7 space-y-4">
                    <img id="main-view-img" src="" class="project-viewer-img" onclick="openLightbox(this.src)">
                    <div id="view-gallery-grid" class="gallery-grid"></div>
                </div>
                <div class="lg:col-span-5 space-y-8">
                    <div class="glass-card p-8 rounded-2xl space-y-8">
                        <div class="flex justify-between border-b border-white/5 pb-6">
                            <div><label>Faction</label><span id="view-faction" class="text-xs font-black accent-red uppercase"></span></div>
                            <div class="text-right"><label>Status</label><span id="view-progress" class="text-2xl font-900 italic"></span></div>
                        </div>
                        <div><label>Field Notes</label><p id="view-notes" class="text-zinc-400 text-sm leading-relaxed"></p></div>
                        <div><label>Recipe Stack</label><div id="view-paints-list" class="grid grid-cols-1 gap-4"></div></div>
                        <div id="admin-controls" class="hidden pt-4"><button onclick="editProject()" class="w-full bg-white text-black text-[10px] font-900 uppercase py-4 rounded-xl hover:bg-red-600 hover:text-white transition-all">Enter Forge</button></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="modal-overlay" onclick="closeModals()">
        <div class="max-w-2xl mx-auto my-12 p-1 bg-[#0a0a0a] rounded-[32px] border border-white/10 shadow-2xl" onclick="event.stopPropagation()">
            <div class="p-8 md:p-10">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-2xl font-900 uppercase italic tracking-tighter">The <span class="accent-red">Forge</span></h2>
                    <button onclick="closeModals()" class="text-zinc-500 hover:text-white">×</button>
                </div>
                <div class="mb-10">
                    <label>Target Project</label>
                    <select id="project-selector" onchange="loadProjectIntoForge(this.value)" class="forge-input w-full">
                        <option value="">+ Add New Registry Entry</option>
                    </select>
                </div>
                <form id="forge-form" class="space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label>Name</label><input type="text" id="f-title" required class="forge-input w-full"></div>
                        <div><label>Faction</label><select id="f-faction" class="forge-input w-full"></select></div>
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div><label>Progress</label><input type="number" id="f-progress" min="0" max="100" class="forge-input w-full"></div>
                        <div><label>Type</label><select id="f-category" class="forge-input w-full"><option value="Commission">Commission</option><option value="Personal">Personal</option></select></div>
                    </div>
                    <div class="glass-card p-6 rounded-2xl">
                        <div class="flex justify-between items-center mb-4"><label class="mb-0">Images</label><button type="button" onclick="addDynamicField('gallery-fields')" class="btn-add">+</button></div>
                        <div id="gallery-fields" class="space-y-3">
                            <label>Cover Thumbnail</label>
                            <input type="text" placeholder="Cover URL" id="f-thumb" required class="forge-input w-full mb-4">
                            <label>Gallery Images</label>
                        </div>
                    </div>
                    <div class="glass-card p-6 rounded-2xl">
                        <div class="flex justify-between items-center mb-4"><label class="mb-0">Paints</label><button type="button" onclick="addDynamicField('paint-fields', true)" class="btn-add">+</button></div>
                        <div id="paint-fields" class="space-y-3"></div>
                    </div>
                    <div><label>Notes</label><textarea id="f-notes" rows="3" class="forge-input w-full"></textarea></div>
                    <div class="flex gap-4 pt-4">
                        <button type="submit" class="flex-grow bg-red-600 text-white font-900 uppercase py-5 rounded-2xl shadow-xl hover:bg-red-500 transition-all tracking-widest text-xs">Sync</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <header class="max-w-5xl mx-auto flex justify-between items-center mb-12">
        <a href="index.html" class="text-[10px] font-900 uppercase tracking-[0.3em] text-zinc-600 hover:text-white transition flex items-center gap-3">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Return
        </a>
        <h1 class="text-2xl font-900 uppercase italic tracking-tighter">Studio <span class="accent-red">Workbench</span></h1>
        <div class="flex items-center gap-6">
            <button id="logout-btn" onclick="handleLogout()" class="hidden text-[10px] font-900 uppercase tracking-[0.3em] text-zinc-600 hover:text-white transition-all">Logout</button>
            <button id="admin-btn" onclick="handleAdminClick()" class="text-[10px] font-900 uppercase tracking-[0.3em] text-zinc-800 hover:text-red-500 transition-all">Login</button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto">
        <div class="mb-12">
            <input type="text" id="search-units" placeholder="Search project database..." oninput="searchProjects(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-red-600 transition-all">
            <div id="filter-container" class="tag-grid">
                <button id="btn-all" onclick="filterFaction('all', this)" class="filter-btn active">All Projects</button>
            </div>
        </div>
        <div id="workbench-list" class="grid grid-cols-1 md:grid-cols-2 gap-10"></div>
    </main>

    <script>
        const GITHUB_USER = "fradley-stack"; 
        const GITHUB_REPO = "theduttybrush";
        const GITHUB_PATH = "data.json";
        const factions = ["Adeptus Astartes", "Chaos Space Marines", "Aeldari", "Necrons", "Orks", "Tyranids", "T'au Empire", "Leagues of Votann", "Astra Militarum", "Adepta Sororitas", "Adeptus Custodes", "Adeptus Mechanicus", "Grey Knights", "Death Guard", "World Eaters", "Thousand Sons", "Drukhari", "Genestealer Cults", "Imperial Knights", "Chaos Knights"];
        
        let allProjectData = [];
        let currentEditTitle = null;
        let currentFilter = 'all';

        // --- Core Utilities ---
        function handleLogout() { sessionStorage.removeItem('gh_token'); location.reload(); }
        function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').style.display = 'flex'; }
        
        function closeModals() { 
            document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); 
            document.body.style.overflow = 'auto'; 
            const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.pushState({path:cleanUrl},'',cleanUrl); 
        }

        // --- Data Population ---
        async function loadData() {
            try {
                const res = await fetch('data.json?v=' + Date.now());
                allProjectData = await res.json();
                renderProjects(allProjectData);
                updateAdminUI();
                
                // Init Project Dropdown
                const sel = document.getElementById('project-selector');
                sel.innerHTML = '<option value="">+ Add New Registry Entry</option>';
                allProjectData.forEach(p => {
                    const name = p.title || p.name;
                    sel.innerHTML += `<option value="${name}">${name}</option>`;
                });

                // Init Faction Dropdown
                const fForge = document.getElementById('f-faction');
                fForge.innerHTML = '';
                factions.sort().forEach(f => fForge.innerHTML += `<option value="${f}">${f}</option>`);

                // Init Filter Tabs
                const filterCont = document.getElementById('filter-container');
                factions.forEach(f => {
                    const btn = document.createElement('button');
                    btn.className = "filter-btn";
                    btn.innerText = f; btn.onclick = (e) => filterFaction(f, e.target);
                    filterCont.appendChild(btn);
                });
                
                const params = new URLSearchParams(window.location.search);
                const project = params.get('project');
                if (project) setTimeout(() => openProjectModal(project), 500);
            } catch (err) { console.error("Error loading data:", err); }
        }

        function renderProjects(data) {
            const list = document.getElementById('workbench-list');
            list.innerHTML = '';
            data.forEach(p => {
                const title = p.title || p.name;
                const prog = p.progress || p.percentage || 0;
                list.innerHTML += `
                    <div onclick="openProjectModal('${title}')" class="glass-card rounded-[32px] overflow-hidden group cursor-pointer border-transparent hover:border-white/20 transition-all duration-500">
                        <div class="thumb-container">
                            <img src="${p.thumbnail}" class="thumb-img">
                            <div class="absolute top-6 left-6"><span class="text-[8px] px-3 py-1.5 rounded-full bg-black/60 backdrop-blur-md border border-white/10 font-black uppercase text-white tracking-widest">${p.faction}</span></div>
                        </div>
                        <div class="p-8">
                            <div class="flex justify-between items-end"><h3 class="text-lg font-900 uppercase italic tracking-tighter text-white group-hover:text-red-500 transition-colors">${title}</h3><span class="text-xs font-black italic text-zinc-600">${prog}%</span></div>
                            <div class="w-full bg-white/5 h-[3px] mt-6 rounded-full overflow-hidden"><div class="bg-red-600 h-full transition-all duration-1000" style="width: ${prog}%"></div></div>
                        </div>
                    </div>`;
            });
        }

        // --- Forge Form Logic ---
        function addDynamicField(containerId, isPaint = false, val1 = '', val2 = '') {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = "dynamic-row";
            if (isPaint) {
                div.innerHTML = `<input type="text" placeholder="Part" value="${val1}" class="w-1/3 forge-input p-cat"><input type="text" placeholder="Colors" value="${val2}" class="w-2/3 forge-input p-val"><button type="button" onclick="this.parentElement.remove()" class="text-zinc-600 hover:text-red-500 px-2">×</button>`;
            } else {
                div.innerHTML = `<input type="text" placeholder="URL" value="${val1}" class="flex-grow forge-input g-input"><button type="button" onclick="this.parentElement.remove()" class="text-zinc-600 hover:text-red-500 px-2">×</button>`;
            }
            container.appendChild(div);
        }

        function loadProjectIntoForge(title) {
            const p = allProjectData.find(x => (x.title || x.name) === title);
            document.querySelectorAll('#gallery-fields .dynamic-row').forEach(r => r.remove());
            document.getElementById('paint-fields').innerHTML = '';
            
            if (!p) { 
                document.getElementById('forge-form').reset(); 
                currentEditTitle = null; 
                return; 
            }
            
            currentEditTitle = p.title || p.name;
            document.getElementById('f-title').value = currentEditTitle;
            document.getElementById('f-progress').value = p.progress || p.percentage || 0;
            document.getElementById('f-faction').value = p.faction;
            document.getElementById('f-category').value = p.category || "Commission";
            document.getElementById('f-thumb').value = p.thumbnail || "";
            document.getElementById('f-notes').value = p.notes || "";
            
            if (p.gallery) p.gallery.forEach(url => addDynamicField('gallery-fields', false, url));
            if (p.paints) Object.entries(p.paints).forEach(([cat, list]) => addDynamicField('paint-fields', true, cat, list));
        }

        document.getElementById('forge-form').onsubmit = async (e) => {
            e.preventDefault();
            const token = sessionStorage.getItem('gh_token');
            if (!token) return alert("Access Denied: No Token Found");

            const paints = {};
            document.querySelectorAll('#paint-fields .dynamic-row').forEach(row => {
                const cat = row.querySelector('.p-cat').value;
                const val = row.querySelector('.p-val').value;
                if (cat) paints[cat] = val;
            });

            const gallery = Array.from(document.querySelectorAll('.g-input')).map(i => i.value).filter(v => v);

            const updatedProject = {
                title: document.getElementById('f-title').value,
                faction: document.getElementById('f-faction').value,
                progress: parseInt(document.getElementById('f-progress').value),
                category: document.getElementById('f-category').value,
                thumbnail: document.getElementById('f-thumb').value,
                notes: document.getElementById('f-notes').value,
                gallery: gallery,
                paints: paints
            };

            if (currentEditTitle) {
                const idx = allProjectData.findIndex(p => (p.title || p.name) === currentEditTitle);
                allProjectData[idx] = updatedProject;
            } else {
                allProjectData.push(updatedProject);
            }

            try {
                // Fetch SHA
                const fileRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const fileData = await fileRes.json();
                
                // Push Update
                const pushRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Forge Sync: ${updatedProject.title}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(allProjectData, null, 2)))),
                        sha: fileData.sha
                    })
                });

                if (pushRes.ok) {
                    alert("Forge Synchronized Successfully!");
                    location.reload();
                } else {
                    alert("Sync Failed. Check Token permissions.");
                }
            } catch (err) { alert("Error: " + err.message); }
        };

        // --- Admin UI ---
        function handleAdminClick() {
            if (sessionStorage.getItem('gh_token')) {
                document.getElementById('admin-modal').style.display = 'block';
            } else {
                const input = prompt("Access Token:");
                if (input) { sessionStorage.setItem('gh_token', input); updateAdminUI(); }
            }
        }

        function updateAdminUI() {
            if (sessionStorage.getItem('gh_token')) {
                document.getElementById('admin-btn').innerText = "Forge Access";
                document.getElementById('logout-btn').classList.remove('hidden');
            }
        }

        function editProject() {
            const title = document.getElementById('view-title').innerText;
            loadProjectIntoForge(title);
            document.getElementById('project-selector').value = title;
            document.getElementById('project-modal').style.display = 'none';
            document.getElementById('admin-modal').style.display = 'block';
        }

        // --- Search & Filter ---
        function searchProjects(q) {
            let filtered = allProjectData;
            if (currentFilter !== 'all') filtered = filtered.filter(p => p.faction === currentFilter);
            if (q) filtered = filtered.filter(p => (p.title || p.name).toLowerCase().includes(q.toLowerCase()));
            renderProjects(filtered);
        }

        function filterFaction(f, el) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            searchProjects(document.getElementById('search-units').value);
        }

        loadData();
    </script>
</body>
</html>
