<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dutty Brush | Workbench</title>
    
    <link rel="icon" type="image/jpeg" href="avatar.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; scroll-behavior: smooth; }
        .hero-gradient { background: radial-gradient(circle at center, #111111 0%, #050505 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .accent-red { color: #ff3e3e; }
        
        /* Modal Overlay */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; backdrop-filter: blur(10px); overflow-y: auto; }
        
        :target {
            border-color: #ff3e3e !important;
            box-shadow: 0 0 20px rgba(255, 62, 62, 0.2);
            transition: all 0.5s ease;
        }

        .filter-btn.active { background-color: #ff3e3e; color: white; border-color: #ff3e3e; opacity: 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="hero-gradient min-h-screen p-6">

    <div id="modal-overlay" onclick="closeModal(event)">
        <div class="max-w-3xl mx-auto my-12 p-6" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-2xl font-900 uppercase italic tracking-tighter"></h2>
                <button onclick="closeModal()" class="text-zinc-500 hover:text-white uppercase text-[10px] font-black tracking-widest">Close [X]</button>
            </div>
            
            <div id="modal-gallery" class="grid grid-cols-1 gap-4 mb-8">
                </div>

            <div class="space-y-4 border-t border-white/10 pt-6">
                <div class="flex justify-between items-center">
                    <span id="modal-faction" class="text-[10px] px-3 py-1 bg-red-600 font-black uppercase tracking-widest rounded"></span>
                    <span id="modal-progress" class="text-xl font-900 accent-red italic text-right"></span>
                </div>
                <p id="modal-desc" class="text-zinc-400 text-sm leading-relaxed italic"></p>
            </div>
        </div>
    </div>

    <header class="max-w-4xl mx-auto flex justify-between items-center mb-12">
        <a href="index.html" class="text-[10px] font-900 uppercase tracking-[0.3em] text-zinc-500 hover:text-white transition flex items-center gap-2">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Return
        </a>
        <h1 class="text-xl font-900 uppercase italic tracking-tighter">STUDIO <span class="accent-red">WORKBENCH</span></h1>
        <button onclick="adminLogin()" class="text-[10px] font-900 uppercase tracking-[0.3em] text-zinc-800 hover:text-red-600 transition">Admin</button>
    </header>

    <main class="max-w-4xl mx-auto">
        <div class="mb-10 overflow-x-auto no-scrollbar pb-4">
            <div id="filter-container" class="flex gap-2 min-w-max">
                <button id="btn-all" onclick="filterFaction('all')" class="filter-btn active px-4 py-2 rounded-full border border-white/10 text-[9px] font-black uppercase tracking-widest transition-all">All</button>
            </div>
        </div>

        <div id="workbench-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        <div id="empty-state" class="hidden text-center py-20">
            <p class="text-zinc-600 text-[10px] font-black uppercase tracking-[0.5em]">No intel found for this faction.</p>
        </div>
    </main>

    <script>
        const factions = [
            "Adeptus Astartes", "Chaos Space Marines", "Aeldari", "Necrons", "Orks", "Tyranids", 
            "T'au Empire", "Leagues of Votann", "Astra Militarum", "Adepta Sororitas", 
            "Adeptus Custodes", "Adeptus Mechanicus", "Grey Knights", "Death Guard", 
            "World Eaters", "Thousand Sons", "Drukhari", "Genestealer Cults", "Imperial Knights", "Chaos Knights"
        ];

        let allProjectData = [];

        // Build Filter UI
        const filterContainer = document.getElementById('filter-container');
        factions.sort().forEach(f => {
            const btn = document.createElement('button');
            btn.className = "filter-btn px-4 py-2 rounded-full border border-white/10 text-[9px] font-black uppercase tracking-widest text-zinc-500 hover:text-white transition-all";
            btn.innerText = f;
            btn.onclick = (e) => filterFaction(f, e.target);
            filterContainer.appendChild(btn);
        });

        function adminLogin() {
            const token = prompt("Enter Studio PAT Token:");
            if (token) { sessionStorage.setItem('gh_token', token); alert("Authenticated."); }
        }

        function filterFaction(faction, element) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'text-white'));
            if (element) element.classList.add('active', 'text-white');
            else document.getElementById('btn-all').classList.add('active', 'text-white');
            
            const filtered = faction === 'all' ? allProjectData : allProjectData.filter(p => p.faction === faction);
            renderProjects(filtered);
        }

        // MODAL LOGIC
        function openModal(projectId) {
            const p = allProjectData.find(proj => (proj.title || proj.name) === projectId);
            if (!p) return;

            document.getElementById('modal-title').innerText = p.title || p.name;
            document.getElementById('modal-faction').innerText = p.faction || "Unaligned";
            document.getElementById('modal-progress').innerText = `${p.progress || p.percentage || 0}%`;
            document.getElementById('modal-desc').innerText = p.description || "No project logs available for this unit.";
            
            const gallery = document.getElementById('modal-gallery');
            gallery.innerHTML = '';
            
            // Handle multiple images if they exist, otherwise use thumbnail
            const images = p.gallery || [p.thumbnail || p.image];
            images.forEach(imgSrc => {
                const img = document.createElement('img');
                img.src = imgSrc;
                img.className = "w-full rounded-xl border border-white/10 shadow-2xl";
                gallery.appendChild(img);
            });

            document.getElementById('modal-overlay').style.display = 'block';
            document.body.style.overflow = 'hidden'; // Prevent scroll
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function renderProjects(data) {
            const container = document.getElementById('workbench-list');
            container.innerHTML = '';
            
            data.forEach(p => {
                const title = p.title || p.name || "Untitled";
                const progress = p.progress || p.percentage || 0;
                const thumb = p.thumbnail || p.image || 'avatar.jpg';
                const faction = p.faction || "Unaligned";
                const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

                const card = document.createElement('div');
                card.id = slug;
                card.onclick = () => openModal(title);
                card.className = "glass-card rounded-2xl overflow-hidden flex flex-col group cursor-pointer transition-all duration-500 border-zinc-800/50";

                card.innerHTML = `
                    <div class="relative h-48 overflow-hidden bg-black">
                        <img src="${thumb}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700 opacity-60">
                        <div class="absolute top-4 left-4 flex flex-col gap-2">
                            <span class="text-[7px] px-2 py-1 rounded bg-red-600 font-black uppercase tracking-widest text-white">${faction}</span>
                        </div>
                        <div class="absolute bottom-4 right-4 bg-black/80 backdrop-blur-md border border-white/10 px-3 py-1 rounded-full text-[10px] font-black">${progress}%</div>
                    </div>
                    <div class="p-6 space-y-4">
                        <h3 class="text-sm font-900 uppercase italic tracking-tighter text-white group-hover:text-red-500 transition-colors">${title}</h3>
                        <div class="w-full bg-white/5 h-[2px] overflow-hidden">
                            <div class="bg-red-600 h-full" style="width: ${progress}%"></div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function loadWorkbench() {
            try {
                const res = await fetch('data.json?v=' + Date.now(), { cache: "no-store" });
                allProjectData = await res.json();
                renderProjects(allProjectData);

                // Auto-open if linked from Forge
                if (window.location.hash) {
                    setTimeout(() => {
                        const slug = window.location.hash.substring(1);
                        const project = allProjectData.find(p => (p.title || p.name).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') === slug);
                        if (project) openModal(project.title || project.name);
                    }, 500);
                }
            } catch (e) { console.error(e); }
        }

        loadWorkbench();
    </script>
</body>
</html>
