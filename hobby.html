<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dutty Brush | Workbench</title>
    
    <link rel="icon" type="image/jpeg" href="avatar.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; scroll-behavior: smooth; }
        .hero-gradient { background: radial-gradient(circle at center, #111111 0%, #050505 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        .accent-red { color: #ff3e3e; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; backdrop-filter: blur(20px); overflow-y: auto; }
        
        .tag-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
        .filter-btn { 
            padding: 6px 14px; border-radius: 8px; font-size: 9px; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 0.05em; border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.02); color: #555; transition: all 0.2s ease;
        }
        .filter-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
        .filter-btn.active { background: #ff3e3e; color: white; border-color: #ff3e3e; }

        .forge-input { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: #fff !important; padding: 12px; border-radius: 8px; width: 100%; outline: none; font-size: 12px; }
        label { font-size: 8px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #444; margin-bottom: 4px; display: block; }

        .project-viewer-img { width: 100%; border-radius: 12px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .gallery-sub-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body class="hero-gradient min-h-screen">

    <nav class="p-8 flex justify-between items-center max-w-7xl mx-auto">
        <a href="index.html" class="text-[10px] font-900 uppercase tracking-[0.4em] flex items-center gap-2">Hub</a>
        <div class="flex gap-4">
            <button id="admin-btn" onclick="handleAdminClick()" class="text-[9px] font-900 uppercase tracking-widest text-zinc-600">Workbench Access</button>
            <button id="logout-btn" onclick="logout()" class="text-[9px] font-900 uppercase tracking-widest text-red-800 hidden">Sever Connection</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pb-24">
        <header class="mb-12">
            <h1 class="text-6xl font-900 uppercase italic tracking-tighter leading-none mb-4">The <span class="accent-red">Workbench</span></h1>
            <p class="text-[10px] font-900 uppercase tracking-[0.4em] text-zinc-500">Live Project Tracker v2.1.0</p>
            
            <div class="mt-12 flex flex-col md:flex-row md:items-end justify-between gap-8">
                <div class="w-full max-w-sm">
                    <label>Search Registry</label>
                    <input type="text" id="search-units" placeholder="Unit Name..." oninput="searchProjects(this.value)" class="w-full bg-transparent border-b border-white/10 py-3 text-sm font-bold focus:border-red-600 outline-none transition-all placeholder:text-zinc-800">
                </div>
                <div class="tag-grid" id="faction-filters">
                    <button onclick="filterFaction('all', this)" class="filter-btn active">All Projects</button>
                </div>
            </div>
        </header>

        <div id="project-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="project-modal" class="modal-overlay p-6">
        <div class="max-w-4xl mx-auto mt-12 mb-24">
            <button onclick="closeModal()" class="mb-8 text-[10px] font-900 uppercase tracking-widest flex items-center gap-2 text-zinc-500">Close File</button>
            <div id="modal-content" class="space-y-12"></div>
        </div>
    </div>

    <div id="admin-modal" class="modal-overlay p-6">
        <div class="max-w-xl mx-auto mt-12 mb-24 glass-card p-10 rounded-3xl">
            <h2 class="text-3xl font-900 uppercase italic mb-8">Forge <span class="accent-red">Control</span></h2>
            
            <form id="forge-form" class="space-y-4">
                <div>
                    <label>Project Selection</label>
                    <select id="project-dropdown" onchange="loadProjectToForm()" class="forge-input">
                        <option value="new">Create New Project</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>Unit Name</label>
                        <input type="text" id="f-title" class="forge-input">
                    </div>
                    <div>
                        <label>Faction</label>
                        <input type="text" id="f-faction" class="forge-input">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>Category</label>
                        <select id="f-category" class="forge-input">
                            <option value="Commission">Commission</option>
                            <option value="Personal">Personal</option>
                        </select>
                    </div>
                    <div>
                        <label>Feed Thumb URL</label>
                        <input type="text" id="f-thumbnail" class="forge-input" placeholder="For index.html card">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>Completion %</label>
                        <input type="number" id="f-progress" class="forge-input">
                    </div>
                    <div>
                        <label>Main Image URL</label>
                        <input type="text" id="f-image" class="forge-input">
                    </div>
                </div>

                <div>
                    <label>Workbench Log</label>
                    <textarea id="f-description" rows="3" class="forge-input"></textarea>
                </div>

                <div>
                    <label>Additional Photos (One per line)</label>
                    <textarea id="f-gallery" rows="3" class="forge-input"></textarea>
                </div>

                <div class="pt-6 flex gap-4">
                    <button type="button" onclick="saveProject()" class="flex-1 bg-white text-black font-900 py-4 rounded-xl uppercase tracking-widest text-[11px]">Commit to Forge</button>
                    <button type="button" onclick="closeAdmin()" class="px-8 border border-white/10 font-900 rounded-xl uppercase tracking-widest text-[11px]">Cancel</button>
                </div>
                
                <div class="pt-4 flex items-center justify-between border-t border-white/5 mt-4">
                    <button type="button" onclick="pushToGitHub()" class="text-red-500 font-900 text-[10px] uppercase tracking-widest">Push to GitHub</button>
                    <button type="button" id="delete-btn" onclick="deleteProject()" class="text-zinc-700 font-900 text-[10px] uppercase tracking-widest hidden">Scrap Project</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let allProjectData = [];
        let currentFilter = 'all';

        async function loadData() {
            try {
                const res = await fetch('data.json?v=' + Date.now(), { cache: "no-store" });
                allProjectData = await res.json();
                renderFilters();
                renderProjects(allProjectData);
                populateForgeDropdown();
                updateAdminUI();
            } catch (err) { console.error("Load failed:", err); }
        }

        function renderFilters() {
            const factions = [...new Set(allProjectData.map(p => p.faction))];
            const container = document.getElementById('faction-filters');
            container.innerHTML = `<button onclick="filterFaction('all', this)" class="filter-btn active">All Projects</button>`;
            factions.forEach(f => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.innerText = f;
                btn.onclick = (e) => filterFaction(f, e.target);
                container.appendChild(btn);
            });
        }

        function renderProjects(data) {
            const container = document.getElementById('project-list');
            container.innerHTML = '';
            data.forEach((p, idx) => {
                const title = p.title || p.name;
                const progress = p.progress || p.percentage || 0;
                const card = document.createElement('div');
                card.className = "glass-card rounded-[32px] overflow-hidden group cursor-pointer transition-all duration-500";
                card.onclick = () => openProject(p);
                card.innerHTML = `
                    <div class="h-64 overflow-hidden relative">
                        <img src="${p.image}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                        <div class="absolute bottom-6 left-6">
                            <span class="text-[8px] font-black uppercase tracking-widest text-red-500 mb-1 block">${p.faction}</span>
                            <h3 class="text-xl font-900 uppercase italic tracking-tighter">${title}</h3>
                        </div>
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-end mb-2">
                            <span class="text-[10px] font-900 uppercase text-zinc-500">Progress</span>
                            <span class="text-lg font-900 italic">${progress}%</span>
                        </div>
                        <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden">
                            <div class="bg-red-600 h-full" style="width: ${progress}%"></div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openProject(p) {
            const modal = document.getElementById('project-modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                    <div>
                        <img src="${p.image}" class="project-viewer-img mb-6">
                        <div class="gallery-grid">
                            ${(p.gallery || []).map(img => `<img src="${img}" class="gallery-sub-img" onclick="window.open(this.src)">`).join('')}
                        </div>
                    </div>
                    <div class="space-y-8">
                        <div>
                            <span class="text-red-500 text-[10px] font-black uppercase tracking-widest">${p.faction}</span>
                            <h2 class="text-5xl font-900 uppercase italic tracking-tighter">${p.title || p.name}</h2>
                        </div>
                        <p class="text-zinc-400 text-sm leading-relaxed">${p.description || ''}</p>
                        <div class="pt-8 border-t border-white/5">
                            <div class="flex justify-between items-end mb-2">
                                <label>Work Status</label>
                                <span class="text-2xl font-900 italic">${p.progress || 0}%</span>
                            </div>
                            <div class="w-full bg-white/5 h-2 rounded-full overflow-hidden">
                                <div class="bg-red-600 h-full" style="width: ${p.progress || 0}%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('project-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function populateForgeDropdown() {
            const dropdown = document.getElementById('project-dropdown');
            dropdown.innerHTML = '<option value="new">Create New Project</option>';
            allProjectData.forEach((p, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.innerText = `Edit: ${p.title || p.name}`;
                dropdown.appendChild(opt);
            });
        }

        function loadProjectToForm() {
            const idx = document.getElementById('project-dropdown').value;
            if (idx === 'new') {
                document.getElementById('forge-form').reset();
                document.getElementById('delete-btn').classList.add('hidden');
                return;
            }
            const p = allProjectData[idx];
            document.getElementById('f-title').value = p.title || p.name || '';
            document.getElementById('f-faction').value = p.faction || '';
            document.getElementById('f-category').value = p.category || 'Commission';
            document.getElementById('f-thumbnail').value = p.thumbnail || '';
            document.getElementById('f-progress').value = p.progress || 0;
            document.getElementById('f-image').value = p.image || '';
            document.getElementById('f-description').value = p.description || '';
            document.getElementById('f-gallery').value = (p.gallery || []).join('\n');
            document.getElementById('delete-btn').classList.remove('hidden');
        }

        function saveProject() {
            const idx = document.getElementById('project-dropdown').value;
            const project = {
                title: document.getElementById('f-title').value,
                faction: document.getElementById('f-faction').value,
                category: document.getElementById('f-category').value,
                thumbnail: document.getElementById('f-thumbnail').value,
                progress: parseInt(document.getElementById('f-progress').value) || 0,
                image: document.getElementById('f-image').value,
                description: document.getElementById('f-description').value,
                gallery: document.getElementById('f-gallery').value.split('\n').filter(l => l.trim() !== '')
            };
            if (idx === 'new') allProjectData.push(project);
            else allProjectData[idx] = project;
            renderProjects(allProjectData);
            alert("Project Committed to Local Forge. Push to Sync.");
        }

        async function pushToGitHub() {
            const token = sessionStorage.getItem('gh_token');
            if (!token) return alert("Unauthorized.");
            const repo = "ClemFandango-hub/The-Dutty-Brush";
            const path = "data.json";
            try {
                const getRes = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const fileData = await getRes.json();
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(allProjectData, null, 2))));
                const putRes = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "Forge Sync", content: content, sha: fileData.sha })
                });
                if (putRes.ok) { alert("Synced."); closeAdmin(); }
            } catch (err) { alert("Sync Error."); }
        }

        function handleAdminClick() {
            const token = sessionStorage.getItem('gh_token');
            if (token) document.getElementById('admin-modal').style.display = 'block';
            else {
                const input = prompt("Access Key:");
                if (input) { sessionStorage.setItem('gh_token', input); updateAdminUI(); }
            }
        }

        function updateAdminUI() {
            if (sessionStorage.getItem('gh_token')) {
                document.getElementById('admin-btn').innerText = "Forge Open";
                document.getElementById('logout-btn').classList.remove('hidden');
            }
        }

        function logout() { sessionStorage.removeItem('gh_token'); location.reload(); }
        function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
        function filterFaction(f, el) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            const filtered = f === 'all' ? allProjectData : allProjectData.filter(p => p.faction === f);
            renderProjects(filtered);
        }

        loadData();
    </script>
</body>
</html>
