<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dutty Brush | Workbench</title>
    
    <link rel="icon" type="image/jpeg" href="avatar.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; scroll-behavior: smooth; }
        .hero-gradient { background: radial-gradient(circle at center, #111111 0%, #050505 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .accent-red { color: #ff3e3e; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; backdrop-filter: blur(15px); overflow-y: auto; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input, textarea, select { 
            background: rgba(255,255,255,0.1) !important; 
            border: 1px solid rgba(255,255,255,0.1) !important; 
            color: #ffffff !important; 
            padding: 10px; 
            border-radius: 8px; 
            width: 100%; 
            font-size: 12px;
            outline: none;
        }
        select option { background: #111; color: white; }
        label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #555; margin-bottom: 4px; display: block; }
        .gallery-img { width: 100%; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 1rem; }
        
        .dynamic-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        .btn-add { background: #222; color: #555; padding: 4px 10px; border-radius: 6px; font-size: 14px; font-weight: 900; }
        .btn-add:hover { color: #fff; background: #ff3e3e; }
    </style>
</head>
<body class="hero-gradient min-h-screen p-6">

    <div id="project-modal" class="modal-overlay" onclick="closeModals()">
        <div class="max-w-3xl mx-auto my-12 p-6" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-8">
                <h2 id="view-title" class="text-2xl font-900 uppercase italic tracking-tighter leading-none"></h2>
                <button onclick="closeModals()" class="text-zinc-500 hover:text-white uppercase text-[10px] font-black tracking-[0.2em]">Close [X]</button>
            </div>
            
            <div id="view-gallery" class="flex flex-col gap-4 mb-10"></div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-10 border-t border-white/10 pt-10">
                <div class="space-y-8">
                    <div>
                        <label>Field Notes</label>
                        <p id="view-notes" class="text-zinc-400 text-sm italic leading-relaxed"></p>
                    </div>
                    <div class="space-y-4">
                        <label>Paint Palette</label>
                        <div id="view-paints-list" class="bg-white/5 p-5 rounded-xl border border-white/5 space-y-4"></div>
                    </div>
                </div>
                <div class="space-y-8">
                    <div class="flex justify-between items-center bg-white/5 p-5 rounded-2xl border border-white/5">
                        <div><label>Faction</label><span id="view-faction" class="text-xs font-black text-red-500 uppercase"></span></div>
                        <div class="text-right"><label>Completion</label><span id="view-progress" class="text-2xl font-900 italic"></span></div>
                    </div>
                    <div id="admin-controls" class="hidden pt-4">
                        <button onclick="editProject()" class="w-full bg-white text-black text-[10px] font-900 uppercase py-4 rounded-xl hover:bg-red-600 hover:text-white transition">Edit Project</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="modal-overlay" onclick="closeModals()">
        <div class="max-w-2xl mx-auto my-12 p-8 glass-card rounded-3xl" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-900 uppercase italic tracking-tighter">Forge <span class="accent-red">Editor</span></h2>
                <button onclick="closeModals()" class="text-zinc-500 hover:text-white uppercase text-[10px] font-black">Cancel</button>
            </div>
            
            <div class="mb-6"><select id="project-selector" onchange="loadProjectIntoForge(this.value)"><option value="">-- Select Project --</option></select></div>

            <form id="forge-form" class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div><label>Title</label><input type="text" id="f-title" required></div>
                    <div><label>Faction</label><select id="f-faction"></select></div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div><label>Progress %</label><input type="number" id="f-progress" min="0" max="100"></div>
                    <div><label>Category</label><select id="f-category"><option value="Commission">Commission</option><option value="Personal">Personal</option></select></div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2"><label>Gallery Images</label><button type="button" onclick="addDynamicField('gallery-fields')" class="btn-add">+</button></div>
                    <div id="gallery-fields" class="space-y-2">
                        <label>Thumbnail</label>
                        <input type="text" placeholder="Main Thumbnail URL" id="f-thumb" required class="mb-2">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2"><label>Paint Categories</label><button type="button" onclick="addDynamicField('paint-fields', true)" class="btn-add">+</button></div>
                    <div id="paint-fields" class="space-y-2"></div>
                </div>

                <div><label>Notes</label><textarea id="f-notes" rows="3"></textarea></div>
                
                <div class="flex gap-4">
                    <button type="submit" class="flex-grow bg-red-600 text-white font-900 uppercase py-5 rounded-2xl shadow-2xl hover:bg-red-500 transition tracking-widest">Sync to Cloud</button>
                    <button type="button" onclick="deleteProject()" class="px-6 bg-zinc-900 text-zinc-500 hover:text-red-500 rounded-2xl border border-white/5 transition uppercase text-[10px] font-black">Delete</button>
                </div>
            </form>
        </div>
    </div>

    <header class="max-w-4xl mx-auto flex justify-between items-center mb-12">
        <a href="index.html" class="text-[10px] font-900 uppercase tracking-[0.3em] text-zinc-500 hover:text-white transition flex items-center gap-2">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Return
        </a>
        <h1 class="text-xl font-900 uppercase italic tracking-tighter leading-none">STUDIO <span class="accent-red">WORKBENCH</span></h1>
        <button id="admin-btn" onclick="handleAdminClick()" class="text-[10px] font-900 uppercase tracking-[0.3em] text-zinc-800 hover:text-red-600 transition">Login</button>
    </header>

    <main class="max-w-4xl mx-auto">
        <div class="mb-10 overflow-x-auto no-scrollbar pb-2">
            <div id="filter-container" class="flex gap-2 min-w-max">
                <button id="btn-all" onclick="filterFaction('all', this)" class="filter-btn active px-5 py-2 rounded-full border border-white/10 text-[9px] font-black uppercase tracking-widest transition-all">All</button>
            </div>
        </div>
        <div id="workbench-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </main>

    <script>
        // HARDCODED REPO DETAILS
        const GITHUB_USER = "fradley-stack"; 
        const GITHUB_REPO = "theduttybrush";
        const GITHUB_PATH = "data.json";

        const factions = ["Adeptus Astartes", "Chaos Space Marines", "Aeldari", "Necrons", "Orks", "Tyranids", "T'au Empire", "Leagues of Votann", "Astra Militarum", "Adepta Sororitas", "Adeptus Custodes", "Adeptus Mechanicus", "Grey Knights", "Death Guard", "World Eaters", "Thousand Sons", "Drukhari", "Genestealer Cults", "Imperial Knights", "Chaos Knights"];
        let allProjectData = [];
        let currentEditTitle = null;

        function addDynamicField(containerId, isPaint = false, val1 = '', val2 = '') {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = "dynamic-row";
            if (isPaint) {
                div.innerHTML = `<input type="text" placeholder="Category" value="${val1}" class="w-1/3 p-cat">
                                 <input type="text" placeholder="Paints" value="${val2}" class="w-2/3 p-val">
                                 <button type="button" onclick="this.parentElement.remove()" class="text-red-500 font-bold px-2">×</button>`;
            } else {
                div.innerHTML = `<input type="text" placeholder="Gallery URL" value="${val1}" class="flex-grow g-input">
                                 <button type="button" onclick="this.parentElement.remove()" class="text-red-500 font-bold px-2">×</button>`;
            }
            container.appendChild(div);
        }

        function handleAdminClick() {
            const token = sessionStorage.getItem('gh_token');
            if (token) openAdminModal();
            else {
                const input = prompt("Enter Studio Token:");
                if (input) { sessionStorage.setItem('gh_token', input); updateAdminUI(); }
            }
        }

        function updateAdminUI() {
            if (sessionStorage.getItem('gh_token')) {
                document.getElementById('admin-btn').innerText = "Forge";
                document.getElementById('admin-btn').classList.replace('text-zinc-800', 'text-zinc-400');
            }
        }

        function loadProjectIntoForge(title) {
            const p = allProjectData.find(x => (x.title || x.name) === title);
            document.querySelectorAll('#gallery-fields .dynamic-row').forEach(r => r.remove());
            document.getElementById('paint-fields').innerHTML = '';
            
            if (!p) { 
                document.getElementById('forge-form').reset(); 
                currentEditTitle = null; 
                return; 
            }
            
            currentEditTitle = p.title || p.name;
            document.getElementById('f-title').value = currentEditTitle;
            document.getElementById('f-progress').value = p.progress || 0;
            document.getElementById('f-faction').value = p.faction || factions[0];
            document.getElementById('f-category').value = p.category || "Commission";
            document.getElementById('f-thumb').value = p.thumbnail || "";
            document.getElementById('f-notes').value = p.notes || "";

            if (p.gallery) p.gallery.forEach(url => addDynamicField('gallery-fields', false, url));
            if (p.paints) Object.entries(p.paints).forEach(([cat, list]) => addDynamicField('paint-fields', true, cat, list));
        }

        function openAdminModal(project = null) {
            const selector = document.getElementById('project-selector');
            selector.innerHTML = '<option value="">-- Create New Project --</option>';
            allProjectData.forEach(p => selector.innerHTML += `<option value="${p.title || p.name}">${p.title || p.name}</option>`);
            document.getElementById('admin-modal').style.display = 'block';
            if (project) { 
                selector.value = project.title || project.name; 
                loadProjectIntoForge(project.title || project.name); 
            } else {
                loadProjectIntoForge("");
            }
        }

        function editProject() {
            const title = document.getElementById('view-title').innerText;
            const p = allProjectData.find(x => (x.title || x.name) === title);
            closeModals();
            openAdminModal(p);
        }

        function openProjectModal(title) {
            const p = allProjectData.find(x => (x.title || x.name) === title);
            if (!p) return;
            document.getElementById('view-title').innerText = title;
            document.getElementById('view-faction').innerText = p.faction || "Unaligned";
            document.getElementById('view-progress').innerText = `${p.progress || 0}%`;
            document.getElementById('view-notes').innerText = p.notes || "";
            
            const pList = document.getElementById('view-paints-list');
            pList.innerHTML = '';
            if (p.paints) {
                Object.entries(p.paints).forEach(([cat, list]) => {
                    pList.innerHTML += `<div><span class="text-[9px] text-zinc-500 font-bold uppercase block">${cat}</span><p class="text-[11px] text-zinc-300">${list}</p></div>`;
                });
            }

            const gallery = document.getElementById('view-gallery');
            gallery.innerHTML = `<img src="${p.thumbnail}" class="gallery-img shadow-2xl border-white/20 border-2">`;
            if (p.gallery) p.gallery.forEach(src => { gallery.innerHTML += `<img src="${src}" class="gallery-img shadow-2xl">`; });

            if (sessionStorage.getItem('gh_token')) document.getElementById('admin-controls').classList.remove('hidden');
            document.getElementById('project-modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); document.body.style.overflow = 'auto'; }

        function renderProjects(data) {
            const list = document.getElementById('workbench-list');
            list.innerHTML = '';
            data.forEach(p => {
                const title = p.title || p.name;
                list.innerHTML += `
                    <div onclick="openProjectModal('${title}')" class="glass-card rounded-2xl overflow-hidden group cursor-pointer border-zinc-800/50 hover:border-red-600/50 transition-all">
                        <div class="h-48 overflow-hidden bg-black relative">
                            <img src="${p.thumbnail}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all opacity-40">
                            <div class="absolute top-4 left-4"><span class="text-[7px] px-2 py-1 rounded bg-red-600 font-black uppercase text-white">${p.faction}</span></div>
                        </div>
                        <div class="p-6">
                            <h3 class="text-sm font-900 uppercase italic tracking-tighter text-white group-hover:text-red-500 transition-colors">${title}</h3>
                            <div class="w-full bg-white/5 h-[2px] mt-4"><div class="bg-red-600 h-full" style="width: ${p.progress || 0}%"></div></div>
                        </div>
                    </div>`;
            });
        }

        function filterFaction(f, el) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'text-white'));
            el.classList.add('active', 'text-white');
            renderProjects(f === 'all' ? allProjectData : allProjectData.filter(p => p.faction === f));
        }

        async function loadData() {
            const res = await fetch('data.json?v=' + Date.now());
            allProjectData = await res.json();
            renderProjects(allProjectData);
            updateAdminUI();
            
            const filterContainer = document.getElementById('filter-container');
            factions.sort().forEach(f => {
                const btn = document.createElement('button');
                btn.className = "filter-btn px-5 py-2 rounded-full border border-white/10 text-[9px] font-black uppercase tracking-widest text-zinc-500 hover:text-white transition-all whitespace-nowrap";
                btn.innerText = f;
                btn.onclick = (e) => filterFaction(f, e.target);
                filterContainer.appendChild(btn);
            });
        }

        async function syncToGithub(message) {
            const token = sessionStorage.getItem('gh_token');
            const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`;
            const fileRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            const fileData = await fileRes.json();

            const pushRes = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: message,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(allProjectData, null, 2)))),
                    sha: fileData.sha
                })
            });

            if(pushRes.ok) { alert("Forge Synced Successfully."); location.reload(); }
            else { alert("Push failed. Verify Token."); }
        }

        document.getElementById('forge-form').onsubmit = async (e) => {
            e.preventDefault();
            const gallery = Array.from(document.querySelectorAll('.g-input')).map(i => i.value).filter(Boolean);
            const paints = {};
            document.querySelectorAll('#paint-fields .dynamic-row').forEach(row => {
                const cat = row.querySelector('.p-cat').value;
                const val = row.querySelector('.p-val').value;
                if(cat) paints[cat] = val;
            });

            const project = {
                title: document.getElementById('f-title').value,
                faction: document.getElementById('f-faction').value,
                progress: parseInt(document.getElementById('f-progress').value),
                category: document.getElementById('f-category').value,
                thumbnail: document.getElementById('f-thumb').value,
                gallery: gallery,
                paints: paints,
                notes: document.getElementById('f-notes').value
            };

            if(currentEditTitle) {
                const idx = allProjectData.findIndex(x => (x.title || x.name) === currentEditTitle);
                allProjectData[idx] = project;
            } else { allProjectData.push(project); }

            syncToGithub(`Forge Sync: ${project.title}`);
        };

        async function deleteProject() {
            if(!currentEditTitle) return alert("Select a project to delete first.");
            if(confirm(`Are you sure you want to delete ${currentEditTitle}?`)) {
                allProjectData = allProjectData.filter(x => (x.title || x.name) !== currentEditTitle);
                syncToGithub(`Forge Delete: ${currentEditTitle}`);
            }
        }

        loadData();
    </script>
</body>
</html>
