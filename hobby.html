<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workbench Admin | The Dutty Brush</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        input, select, textarea { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        .active-toggle { background: #dc2626 !important; border-color: #dc2626 !important; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto space-y-8">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-black italic tracking-tighter uppercase">Workbench <span class="text-red-600">Admin</span></h2>
            <a href="index.html" class="text-[10px] uppercase font-bold opacity-40">Back to Hub</a>
        </div>

        <div class="glass p-6 rounded-2xl space-y-4">
            <div class="space-y-1">
                <label class="text-[10px] uppercase font-bold text-zinc-500">Project Name</label>
                <input type="text" id="name" placeholder="e.g. Night Lord Praetor" class="w-full p-3 rounded-lg outline-none focus:border-red-600 transition">
            </div>

            <div class="space-y-1">
                <label class="text-[10px] uppercase font-bold text-zinc-500">Project Type</label>
                <div class="flex gap-2">
                    <button onclick="setType('Personal')" id="btn-personal" class="flex-1 py-2 rounded-lg border border-white/10 text-[10px] font-bold uppercase active-toggle">Personal</button>
                    <button onclick="setType('Commission')" id="btn-commission" class="flex-1 py-2 rounded-lg border border-white/10 text-[10px] font-bold uppercase">Commission</button>
                </div>
            </div>

            <div class="space-y-1">
                <div class="flex justify-between text-[10px] uppercase font-bold text-zinc-500">
                    <label>Completion</label>
                    <span id="percent-label" class="text-red-600">50%</span>
                </div>
                <input type="range" id="percentage" min="0" max="100" value="50" oninput="document.getElementById('percent-label').innerText = this.value + '%'" class="w-full h-1 bg-zinc-800 rounded-lg appearance-none cursor-pointer accent-red-600">
            </div>

            <div class="space-y-1">
                <label class="text-[10px] uppercase font-bold text-zinc-500">Cloudinary URL</label>
                <input type="text" id="image" placeholder="Paste link here..." class="w-full p-3 rounded-lg outline-none">
            </div>

            <button onclick="saveProject()" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase text-xs hover:bg-red-600 hover:text-white transition-all shadow-xl">Deploy to Forge</button>
        </div>
    </div>

    <script>
        let selectedType = "Personal";

        function setType(type) {
            selectedType = type;
            document.getElementById('btn-personal').classList.toggle('active-toggle', type === 'Personal');
            document.getElementById('btn-commission').classList.toggle('active-toggle', type === 'Commission');
        }

        async function saveProject() {
            const newProject = {
                name: document.getElementById('name').value,
                percentage: document.getElementById('percentage').value,
                type: selectedType,
                image: document.getElementById('image').value,
                date: new Date().toISOString()
            };

            // Note: In a real server environment, you'd POST this to an API.
            // For now, this prepares the JSON object for your data.json.
            console.log("New Project Data:", JSON.stringify(newProject));
            alert("Project ready! Update your data.json with this data.");
        }
    </script>
</body>
</html>
