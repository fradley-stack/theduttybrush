<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Forge | Workbench</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; }
        .hero-gradient { background: radial-gradient(circle at top right, #111111 0%, #050505 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .accent-red { color: #ff3e3e; }
        /* Custom Scrollbar for Gallery */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="hero-gradient min-h-screen p-6">

    <header class="max-w-2xl mx-auto mb-12 flex justify-between items-center">
        <div>
            <a href="index.html" class="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500 hover:text-white transition-colors">← Back to Studio</a>
            <h1 class="text-3xl font-900 uppercase italic tracking-tighter mt-2">The <span class="accent-red">Forge</span></h1>
        </div>
        <div class="text-right">
            <span id="project-count" class="text-[10px] font-black bg-white/5 border border-white/10 px-3 py-1 rounded-full text-zinc-400 uppercase tracking-widest">0 Projects</span>
        </div>
    </header>

    <div id="project-list" class="max-w-2xl mx-auto space-y-12">
        </div>

    <footer class="max-w-2xl mx-auto py-20 text-center opacity-20 italic text-xs">
        End of current transmission.
    </footer>

    <script>
        async function loadWorkbench() {
            try {
                const res = await fetch('data.json?v=' + Date.now(), { cache: "no-store" });
                const data = await res.json();
                
                document.getElementById('project-count').innerText = `${data.length} Projects`;
                const list = document.getElementById('project-list');
                list.innerHTML = '';

                data.forEach(project => {
                    // Check if images is an array or a single string
                    const images = Array.isArray(project.images) ? project.images : [project.image || project.images];
                    
                    const card = document.createElement('div');
                    card.className = 'space-y-4 group';

                    // Gallery/Image Logic
                    let mediaHTML = '';
                    if (images.length > 1) {
                        // Multi-image Horizontal Scroll
                        mediaHTML = `
                            <div class="flex gap-3 overflow-x-auto no-scrollbar snap-x snap-mandatory">
                                ${images.map(img => `
                                    <div class="min-w-[85%] md:min-w-[70%] snap-center">
                                        <img src="${img}" class="w-full aspect-square object-cover rounded-xl border border-white/5 grayscale group-hover:grayscale-0 transition-all duration-700">
                                    </div>
                                `).join('')}
                            </div>
                            <div class="flex gap-1 justify-center opacity-30">
                                ${images.map(() => `<div class="w-1 h-1 bg-white rounded-full"></div>`).join('')}
                            </div>
                        `;
                    } else {
                        // Single Image
                        mediaHTML = `
                            <img src="${images[0]}" class="w-full aspect-square object-cover rounded-xl border border-white/5 grayscale group-hover:grayscale-0 transition-all duration-700">
                        `;
                    }

                    card.innerHTML = `
                        ${mediaHTML}
                        <div class="flex justify-between items-start pt-2">
                            <div>
                                <span class="text-[8px] font-black uppercase tracking-[0.2em] ${project.type === 'Commission' ? 'text-red-500' : 'text-zinc-500'}">${project.type || 'Personal'}</span>
                                <h3 class="text-xl font-bold uppercase tracking-tight">${project.name}</h3>
                            </div>
                            <div class="text-right">
                                <span class="text-[10px] font-black text-red-500">${project.percentage}%</span>
                                <div class="w-24 bg-white/5 h-1 rounded-full mt-1 overflow-hidden">
                                    <div class="bg-red-600 h-full" style="width: ${project.percentage}%"></div>
                                </div>
                            </div>
                        </div>
                        <p class="text-xs text-zinc-400 leading-relaxed max-w-lg">${project.description || 'No project briefing available.'}</p>
                    `;
                    list.appendChild(card);
                });
            } catch (e) {
                console.error("Workbench load failed", e);
            }
        }

        loadWorkbench();
    </script>
</body>
</html>
