<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dutty Brush | Workbench</title>
    
    <link rel="icon" type="image/jpeg" href="avatar.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; scroll-behavior: smooth; }
        .hero-gradient { background: radial-gradient(circle at center, #111111 0%, #050505 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .accent-red { color: #ff3e3e; }
        
        /* Modal Overlays */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; backdrop-filter: blur(15px); overflow-y: auto; }
        
        :target { border-color: #ff3e3e !important; box-shadow: 0 0 20px rgba(255, 62, 62, 0.2); }
        .filter-btn.active { background-color: #ff3e3e; color: white; border-color: #ff3e3e; opacity: 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Fix for White-on-White Dropdowns */
        input, textarea, select { 
            background: rgba(255,255,255,0.1) !important; 
            border: 1px solid rgba(255,255,255,0.2) !important; 
            color: #ffffff !important; 
            padding: 10px; 
            border-radius: 8px; 
            width: 100%; 
            font-size: 12px;
            outline: none;
        }
        select option { background: #111; color: white; }
        
        label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #666; margin-bottom: 4px; display: block; }
    </style>
</head>
<body class="hero-gradient min-h-screen p-6">

    <div id="project-modal" class="modal-overlay" onclick="closeModals(event)">
        <div class="max-w-3xl mx-auto my-12 p-6" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h2 id="view-title" class="text-2xl font-900 uppercase italic tracking-tighter leading-none"></h2>
                <button onclick="closeModals()" class="text-zinc-500 hover:text-white uppercase text-[10px] font-black tracking-widest">Close [X]</button>
            </div>
            
            <div id="view-gallery" class="grid grid-cols-1 gap-4 mb-8"></div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 border-t border-white/10 pt-8">
                <div class="space-y-6">
                    <div>
                        <label>Notes</label>
                        <p id="view-notes" class="text-zinc-400 text-sm italic leading-relaxed"></p>
                    </div>
                    <div>
                        <label>Paints</label>
                        <p id="view-paints" class="text-zinc-300 text-xs font-mono bg-white/5 p-4 rounded-lg whitespace-pre-line"></p>
                    </div>
                </div>
                <div class="space-y-6">
                    <div class="flex justify-between items-center bg-white/5 p-4 rounded-xl">
                        <div><label>Faction</label><span id="view-faction" class="text-sm font-bold text-red-500 uppercase"></span></div>
                        <div class="text-right"><label>Progress</label><span id="view-progress" class="text-xl font-900 italic"></span></div>
                    </div>
                    <div id="admin-controls" class="hidden pt-4">
                        <button onclick="editProject()" class="w-full bg-white text-black text-[10px] font-900 uppercase py-3 rounded-lg hover:bg-red-600 hover:text-white transition">Edit Project</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="modal-overlay" onclick="closeModals(event)">
        <div class="max-w-xl mx-auto my-12 p-8 glass-card rounded-2xl" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-900 uppercase italic tracking-tighter">Project <span class="accent-red">Editor</span></h2>
                <button onclick="closeModals()" class="text-zinc-500 hover:text-white uppercase text-[10px] font-black">Cancel</button>
            </div>
            
            <form id="forge-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div><label>Project Title</label><input type="text" id="f-title" required></div>
                    <div><label>Faction</label><select id="f-faction"></select></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label>Progress %</label><input type="number" id="f-progress" min="0" max="100"></div>
                    <div><label>Category</label>
                        <select id="f-category">
                            <option value="Commission">Commission</option>
                            <option value="Personal">Personal</option>
                        </select>
                    </div>
                </div>
                <div><label>Thumbnail URL</label><input type="text" id="f-thumb"></div>
                <div><label>Gallery (URLs separated by comma)</label><textarea id="f-gallery" rows="2"></textarea></div>
                <div><label>Paint List</label><textarea id="f-paints" rows="3"></textarea></div>
                <div><label>Notes</label><textarea id="f-notes" rows="3"></textarea></div>
                
                <button type="submit" class="w-full bg-red-600 text-white font-900 uppercase py-4 rounded-xl mt-4 shadow-lg hover:bg-red-500 transition">Push Data to GitHub</button>
            </form>
        </div>
    </div>

    <header class="max-w-4xl mx-auto flex justify-between items-center mb-12">
        <a href="index.html" class="text-[10px] font-900 uppercase tracking-[0.3em] text-zinc-500 hover:text-white transition flex items-center gap-2">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Return
        </a>
        <h1 class="text-xl font-900 uppercase italic tracking-tighter leading-none">STUDIO <span class="accent-red">WORKBENCH</span></h1>
        <button id="admin-entry" onclick="authAdmin()" class="text-[10px] font-900 uppercase tracking-[0.3em] text-zinc-800 hover:text-red-600 transition">Login</button>
    </header>

    <main class="max-w-4xl mx-auto">
        <div id="filter-container" class="flex gap-2 overflow-x-auto no-scrollbar mb-10 pb-4">
            <button id="btn-all" onclick="filterFaction('all')" class="filter-btn active px-4 py-2 rounded-full border border-white/10 text-[9px] font-black uppercase tracking-widest transition-all">All</button>
        </div>
        <div id="workbench-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </main>

    <script>
        const factions = ["Adeptus Astartes", "Chaos Space Marines", "Aeldari", "Necrons", "Orks", "Tyranids", "T'au Empire", "Leagues of Votann", "Astra Militarum", "Adepta Sororitas", "Adeptus Custodes", "Adeptus Mechanicus", "Grey Knights", "Death Guard", "World Eaters", "Thousand Sons", "Drukhari", "Genestealer Cults", "Imperial Knights", "Chaos Knights"];
        let allProjectData = [];
        let currentEditTitle = null;

        // Init Filter & Form Factions
        const filterContainer = document.getElementById('filter-container');
        const factionSelect = document.getElementById('f-faction');
        factions.sort().forEach(f => {
            const btn = document.createElement('button');
            btn.className = "filter-btn px-4 py-2 rounded-full border border-white/10 text-[9px] font-black uppercase tracking-widest text-zinc-500 hover:text-white transition-all whitespace-nowrap";
            btn.innerText = f;
            btn.onclick = (e) => filterFaction(f, e.target);
            filterContainer.appendChild(btn);
            
            const opt = document.createElement('option');
            opt.value = f; opt.innerText = f;
            factionSelect.appendChild(opt);
        });

        function authAdmin() {
            if (sessionStorage.getItem('gh_token')) {
                openAdminModal();
            } else {
                const token = prompt("Enter Password/Token:");
                if (token) {
                    sessionStorage.setItem('gh_token', token);
                    document.getElementById('admin-entry').innerText = "Forge";
                    document.getElementById('admin-controls').classList.remove('hidden');
                }
            }
        }

        function openAdminModal(project = null) {
            document.getElementById('admin-modal').style.display = 'block';
            if (project) {
                currentEditTitle = project.title || project.name;
                document.getElementById('f-title').value = currentEditTitle;
                document.getElementById('f-progress').value = project.progress || 0;
                document.getElementById('f-faction').value = project.faction || factions[0];
                document.getElementById('f-category').value = project.category || "Commission";
                document.getElementById('f-thumb').value = project.thumbnail || "";
                document.getElementById('f-gallery').value = (project.gallery || []).join(', ');
                document.getElementById('f-paints').value = project.paints || "";
                document.getElementById('f-notes').value = project.notes || "";
            } else {
                document.getElementById('forge-form').reset();
                currentEditTitle = null;
            }
        }

        function editProject() {
            const title = document.getElementById('view-title').innerText;
            const p = allProjectData.find(x => (x.title || x.name) === title);
            closeModals();
            openAdminModal(p);
        }

        function openProjectModal(title) {
            const p = allProjectData.find(x => (x.title || x.name) === title);
            if (!p) return;
            document.getElementById('view-title').innerText = title;
            document.getElementById('view-faction').innerText = p.faction || "Unaligned";
            document.getElementById('view-progress').innerText = `${p.progress || 0}%`;
            document.getElementById('view-notes').innerText = p.notes || "";
            document.getElementById('view-paints').innerText = p.paints || "";
            
            const gallery = document.getElementById('view-gallery');
            gallery.innerHTML = '';
            const imgs = p.gallery && p.gallery.length ? p.gallery : [p.thumbnail];
            imgs.forEach(src => {
                const img = document.createElement('img');
                img.src = src; img.className = "w-full rounded-xl border border-white/10";
                gallery.appendChild(img);
            });

            if (sessionStorage.getItem('gh_token')) document.getElementById('admin-controls').classList.remove('hidden');
            document.getElementById('project-modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
            document.body.style.overflow = 'auto';
        }

        function renderProjects(data) {
            const list = document.getElementById('workbench-list');
            list.innerHTML = '';
            data.forEach(p => {
                const title = p.title || p.name;
                const progress = p.progress || 0;
                const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
                const card = document.createElement('div');
                card.id = slug;
                card.onclick = () => openProjectModal(title);
                card.className = "glass-card rounded-2xl overflow-hidden group cursor-pointer border-zinc-800/50 transition-all";
                card.innerHTML = `
                    <div class="h-48 overflow-hidden bg-black relative">
                        <img src="${p.thumbnail}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all opacity-60">
                        <div class="absolute top-4 left-4"><span class="text-[7px] px-2 py-1 rounded bg-red-600 font-black uppercase text-white">${p.faction}</span></div>
                    </div>
                    <div class="p-6">
                        <h3 class="text-sm font-900 uppercase italic tracking-tighter text-white group-hover:text-red-500 transition-colors">${title}</h3>
                        <div class="w-full bg-white/5 h-[2px] mt-4"><div class="bg-red-600 h-full" style="width: ${progress}%"></div></div>
                    </div>`;
                list.appendChild(card);
            });
        }

        function filterFaction(f, el) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'text-white'));
            el ? el.classList.add('active', 'text-white') : document.getElementById('btn-all').classList.add('active', 'text-white');
            renderProjects(f === 'all' ? allProjectData : allProjectData.filter(p => p.faction === f));
        }

        async function loadData() {
            const res = await fetch('data.json?v=' + Date.now());
            allProjectData = await res.json();
            renderProjects(allProjectData);
        }

        // PUSH LOGIC
        document.getElementById('forge-form').onsubmit = async (e) => {
            e.preventDefault();
            const token = sessionStorage.getItem('gh_token');
            if(!token) return alert("Login First");

            const project = {
                title: document.getElementById('f-title').value,
                faction: document.getElementById('f-faction').value,
                progress: parseInt(document.getElementById('f-progress').value),
                category: document.getElementById('f-category').value,
                thumbnail: document.getElementById('f-thumb').value,
                gallery: document.getElementById('f-gallery').value.split(',').map(s => s.trim()),
                paints: document.getElementById('f-paints').value,
                notes: document.getElementById('f-notes').value
            };

            if(currentEditTitle) {
                const idx = allProjectData.findIndex(x => (x.title || x.name) === currentEditTitle);
                allProjectData[idx] = project;
            } else {
                allProjectData.push(project);
            }

            try {
                const url = 'https://api.github.com/repos/YOUR_USERNAME/YOUR_REPO/contents/data.json';
                const fileRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
                const fileData = await fileRes.json();

                const pushRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Forge: Project Sync",
                        content: btoa(JSON.stringify(allProjectData, null, 2)),
                        sha: fileData.sha
                    })
                });

                if(pushRes.ok) { alert("Forge Updated."); location.reload(); }
                else { alert("Push Failed. Check Access Key."); }
            } catch (err) { alert("Error connecting to GitHub."); }
        };

        loadData();
    </script>
</body>
</html>
