<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Workbench | The Dutty Brush</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); }
        .admin-trigger { position: fixed; bottom: 15px; right: 15px; opacity: 0.1; transition: 0.3s; cursor: pointer; font-weight: 900; z-index: 50; }
        .admin-trigger:hover { opacity: 1; color: #dc2626; transform: scale(1.2); }
        #admin-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; }
        .active-type { background: #dc2626 !important; border-color: #dc2626 !important; }
        .recipe-tag { font-size: 7px; padding: 2px 5px; border-radius: 4px; font-weight: 900; text-transform: uppercase; margin-right: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .tag-primer { background: #27272a; color: #a1a1aa; }
        .tag-base { background: #7f1d1d; color: #fca5a5; }
        .tag-layer { background: #1e3a8a; color: #93c5fd; }
        .tag-highlight { background: #14532d; color: #86efac; }
    </style>
</head>
<body>

    <main class="max-w-6xl mx-auto p-8 space-y-12">
        <header class="flex justify-between items-end border-b border-white/10 pb-8">
            <div>
                <h1 class="text-4xl font-black italic uppercase tracking-tighter leading-none">The <span class="text-red-600">Workbench</span></h1>
                <p class="text-[10px] uppercase tracking-[0.3em] text-zinc-500 font-bold mt-2">Grimdark Archives & Paint Recipes</p>
            </div>
            <a href="index.html" class="text-[10px] font-black uppercase tracking-widest bg-white/5 px-6 py-3 rounded-full hover:bg-red-600 transition">Return Hub</a>
        </header>

        <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </main>

    <div class="admin-trigger" onclick="toggleAdmin()">D</div>

    <div id="admin-panel">
        <div class="glass p-8 rounded-3xl w-full max-w-4xl space-y-8 relative max-h-[90vh] overflow-y-auto">
            <button onclick="toggleAdmin()" class="absolute top-6 right-6 text-zinc-500 hover:text-white">✕ Close</button>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="space-y-6">
                    <h2 class="text-2xl font-black italic uppercase text-red-600 tracking-tighter">Forge Master</h2>
                    <div class="space-y-4">
                        <input type="text" id="edit-name" placeholder="Project Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-red-600">
                        <div class="flex gap-2">
                            <button id="btn-p" onclick="setEditType('Personal')" class="flex-1 py-3 glass rounded-xl text-[10px] font-black uppercase active-type">Personal</button>
                            <button id="btn-c" onclick="setEditType('Commission')" class="flex-1 py-3 glass rounded-xl text-[10px] font-black uppercase">Commission</button>
                        </div>
                        <input type="text" id="edit-img" placeholder="Cloudinary Image URL" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                        
                        <div class="space-y-3 p-4 bg-white/5 rounded-2xl border border-white/5">
                            <label class="text-[10px] font-black uppercase text-zinc-500">Paint Recipe Builder</label>
                            <div id="paint-list" class="space-y-2"></div>
                            <div class="flex gap-2 mt-2">
                                <select id="paint-type" class="bg-zinc-900 text-[10px] p-2 rounded border border-white/10 text-white outline-none">
                                    <option value="primer">Primer</option>
                                    <option value="base">Base</option>
                                    <option value="layer">Layer</option>
                                    <option value="highlight">Highlight</option>
                                </select>
                                <input type="text" id="paint-name" placeholder="Paint Name..." class="flex-1 bg-zinc-900 text-[10px] p-2 rounded border border-white/10 outline-none">
                                <button onclick="addPaint()" class="bg-red-600 px-4 rounded font-bold text-xs text-white">+</button>
                            </div>
                        </div>

                        <div class="space-y-1">
                            <div class="flex justify-between text-[10px] font-bold uppercase"><span>Progress</span> <span id="val" class="text-red-600">50%</span></div>
                            <input type="range" id="edit-perc" class="w-full accent-red-600" oninput="document.getElementById('val').innerText = this.value + '%'">
                        </div>
                        <button onclick="applyChanges()" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase text-sm hover:bg-red-600 hover:text-white transition shadow-2xl">Copy Master JSON</button>
                    </div>
                </div>

                <div class="space-y-6 border-l border-white/5 pl-0 lg:pl-10">
                    <h2 class="text-2xl font-black italic uppercase text-zinc-500 tracking-tighter">Archive</h2>
                    <div id="admin-list" class="space-y-3 overflow-y-auto max-h-[500px] pr-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let projects = [];
        let editingIndex = null;
        let currentEditType = "Personal";
        let currentRecipe = [];

        async function loadData() {
            const r = await fetch('data.json?t=' + Date.now());
            projects = await r.json();
            renderGallery();
        }

        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = projects.map(p => `
                <div class="glass rounded-3xl overflow-hidden flex flex-col h-full border-white/5 hover:border-red-600/30 transition duration-500">
                    <img src="${p.image}" class="w-full aspect-[4/5] object-cover opacity-90">
                    <div class="p-6 flex-grow space-y-4">
                        <div class="flex justify-between items-center">
                            <span class="text-[8px] font-black uppercase px-2 py-1 border border-white/10 rounded-md ${p.type === 'Commission' ? 'text-red-500' : 'text-zinc-500'}">${p.type}</span>
                            <span class="text-xs font-bold text-red-600 italic">${p.percentage}%</span>
                        </div>
                        <h3 class="text-xl font-black uppercase italic tracking-tighter">${p.name}</h3>
                        
                        <div class="space-y-1.5 pt-2 border-t border-white/5">
                            <p class="text-[8px] uppercase font-bold text-zinc-600 mb-2">Recipe Card</p>
                            ${(p.recipe || []).map((paint, idx) => `
                                <div class="flex items-center text-[10px] font-medium text-zinc-400">
                                    <span class="recipe-tag tag-${paint.type}">${paint.type}${paint.type === 'layer' || paint.type === 'highlight' ? ' ' + (idx + 1) : ''}</span>
                                    ${paint.name}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleAdmin() {
            const p = document.getElementById('admin-panel');
            p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
            if(p.style.display === 'flex') loadAdminList();
        }

        function loadAdminList() {
            const list = document.getElementById('admin-list');
            list.innerHTML = projects.map((p, i) => `
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5 hover:border-red-600 transition cursor-pointer" onclick="editProject(${i})">
                    <span class="text-[11px] font-bold uppercase truncate pr-4">${p.name}</span>
                    <span class="text-[10px] font-black text-red-600 italic">${p.percentage}%</span>
                </div>
            `).join('');
        }

        function addPaint() {
            const type = document.getElementById('paint-type').value;
            const name = document.getElementById('paint-name').value;
            if(!name) return;
            currentRecipe.push({ type, name });
            document.getElementById('paint-name').value = '';
            renderRecipeBuilder();
        }

        function renderRecipeBuilder() {
            const list = document.getElementById('paint-list');
            list.innerHTML = currentRecipe.map((p, i) => `
                <div class="flex justify-between items-center text-[9px] bg-black/40 p-2 rounded">
                    <span><span class="uppercase font-black text-red-600">${p.type}:</span> ${p.name}</span>
                    <button onclick="currentRecipe.splice(${i}, 1); renderRecipeBuilder();" class="text-zinc-600 font-bold hover:text-white">✕</button>
                </div>
            `).join('');
        }

        function editProject(index) {
            editingIndex = index;
            const p = projects[index];
            document.getElementById('edit-name').value = p.name;
            document.getElementById('edit-img').value = p.image;
            document.getElementById('edit-perc').value = p.percentage;
            document.getElementById('val').innerText = p.percentage + '%';
            currentRecipe = p.recipe || [];
            setEditType(p.type || 'Personal');
            renderRecipeBuilder();
        }

        function setEditType(t) {
            currentEditType = t;
            document.getElementById('btn-p').classList.toggle('active-type', t === 'Personal');
            document.getElementById('btn-c').classList.toggle('active-type', t === 'Commission');
        }

        function applyChanges() {
            const updated = {
                name: document.getElementById('edit-name').value,
                percentage: parseInt(document.getElementById('edit-perc').value),
                type: currentEditType,
                image: document.getElementById('edit-img').value,
                recipe: currentRecipe
            };

            if (editingIndex !== null) projects[editingIndex] = updated;
            else projects.unshift(updated);

            navigator.clipboard.writeText(JSON.stringify(projects, null, 2));
            alert("Master JSON copied! Update data.json.");
            renderGallery();
        }

        loadData();
    </script>
</body>
</html>
