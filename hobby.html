<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Workbench | The Dutty Brush</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); }
        .admin-trigger { position: fixed; bottom: 20px; right: 20px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); color: white; border-radius: 4px; opacity: 0.15; cursor: pointer; font-weight: 900; font-size: 12px; z-index: 100; transition: all 0.2s; }
        .admin-trigger:hover { opacity: 1; color: #ff3e3e; }
        #admin-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .active-type { background: #ff3e3e !important; color: white !important; }
        .tag-primer { border-color: #52525b; color: #a1a1aa; }
        .tag-base { border-color: #991b1b; color: #fca5a5; }
        .tag-layer { border-color: #1e40af; color: #93c5fd; }
        .tag-highlight { border-color: #166534; color: #86efac; }
    </style>
</head>
<body class="min-h-screen">

    <main class="max-w-6xl mx-auto p-8 space-y-12">
        <header class="flex justify-between items-end border-b border-white/5 pb-10">
            <div>
                <h1 class="text-5xl font-900 uppercase italic tracking-tighter leading-none">The <span class="text-red-600">Workbench</span></h1>
                <p class="text-[10px] uppercase tracking-[0.4em] text-zinc-500 font-bold mt-3">Recipe Archives & Project Gallery</p>
            </div>
            <a href="index.html" class="text-[10px] font-900 uppercase tracking-widest bg-white/5 px-8 py-4 rounded-full hover:bg-red-600 transition-all">Return Hub</a>
        </header>
        <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 pb-20"></div>
    </main>

    <div class="admin-trigger" onclick="authenticate()">D</div>

    <div id="admin-panel">
        <div class="glass p-10 rounded-3xl w-full max-w-5xl space-y-8 relative max-h-[90vh] overflow-y-auto border border-white/10 text-left">
            <button onclick="document.getElementById('admin-panel').style.display='none'" class="absolute top-8 right-8 text-zinc-500 font-bold hover:text-white uppercase text-[10px]">✕ Close</button>
            <div class="grid lg:grid-cols-2 gap-12">
                <div class="space-y-6">
                    <h2 class="text-2xl font-900 italic uppercase text-red-600 tracking-tighter">Forge Editor</h2>
                    <input type="text" id="edit-name" placeholder="Project Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-red-600">
                    <div class="flex gap-2">
                        <button id="btn-p" onclick="setEditType('Personal')" class="flex-1 py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-black uppercase active-type">Personal</button>
                        <button id="btn-c" onclick="setEditType('Commission')" class="flex-1 py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-black uppercase">Commission</button>
                    </div>
                    <input type="text" id="edit-img" placeholder="Image URL (e.g. models/pic.jpg)" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none text-xs">
                    
                    <div class="p-5 bg-black/40 rounded-2xl border border-white/5 space-y-4">
                        <p class="text-[9px] font-black uppercase text-zinc-500 tracking-widest">Recipe Builder</p>
                        <div id="paint-list-editor" class="space-y-2 max-h-40 overflow-y-auto"></div>
                        <div class="flex gap-2">
                            <select id="paint-type" class="bg-zinc-900 text-[10px] p-2 rounded border border-white/10 uppercase font-bold text-white"><option value="primer">Primer</option><option value="base">Base</option><option value="layer">Layer</option><option value="highlight">Highlight</option></select>
                            <input type="text" id="paint-name" class="flex-1 bg-zinc-900 text-xs p-2 rounded border border-white/10 outline-none">
                            <button onclick="addPaint()" class="bg-red-600 px-4 rounded font-bold text-white">+</button>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between text-[10px] font-black uppercase text-zinc-500"><span>Completion</span><span id="val" class="text-red-600">0%</span></div>
                        <input type="range" id="edit-perc" min="0" max="100" class="w-full accent-red-600" oninput="document.getElementById('val').innerText = this.value + '%'">
                    </div>
                    <button id="commit-btn" onclick="applyAndPush()" class="w-full bg-white text-black py-5 rounded-2xl font-900 uppercase text-[11px] tracking-widest hover:bg-red-600 hover:text-white transition-all">Commit to Forge</button>
                </div>
                <div class="space-y-6 border-l border-white/5 pl-10">
                    <h2 class="text-2xl font-900 italic uppercase text-zinc-600 tracking-tighter">Archives</h2>
                    <div id="admin-list" class="space-y-3 overflow-y-auto max-h-[500px]"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sessionPAT = ""; 
        let projects = []; let editingIndex = null; let currentEditType = "Personal"; let currentRecipe = [];
        const REPO_OWNER = "Clem-DuttyBrush"; // Update to your username
        const REPO_NAME = "DuttyBrush_Studio"; // Update to your repo
        const FILE_PATH = "data.json";

        function authenticate() {
            const entry = prompt("Enter PAT for Forge access:");
            if (entry) {
                sessionPAT = entry;
                document.getElementById('admin-panel').style.display = 'flex';
                renderAdminList();
            }
        }

        async function applyAndPush() {
            const btn = document.getElementById('commit-btn');
            btn.innerText = "FORGING...";
            btn.disabled = true;

            const update = {
                name: document.getElementById('edit-name').value,
                percentage: parseInt(document.getElementById('edit-perc').value),
                type: currentEditType,
                image: document.getElementById('edit-img').value,
                recipe: currentRecipe
            };

            if(editingIndex !== null) projects[editingIndex] = update;
            else projects.unshift(update);

            try {
                // 1. Get current file SHA
                const getRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    headers: { 'Authorization': `token ${sessionPAT}` }
                });
                const fileData = await getRes.json();
                
                // 2. Push updated JSON
                const putRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `token ${sessionPAT}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Forge Update: ${update.name}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(projects, null, 2)))),
                        sha: fileData.sha
                    })
                });

                if (putRes.ok) {
                    alert("Forge Sync Complete!");
                    location.reload();
                } else {
                    throw new Error("Push Failed");
                }
            } catch (e) {
                alert("Error: check PAT or Repo settings.");
                console.error(e);
            } finally {
                btn.innerText = "Commit to Forge";
                btn.disabled = false;
            }
        }

        async function loadData() {
            try { const r = await fetch('data.json?t=' + Date.now()); projects = await r.json(); renderGallery(); } catch(e) {}
        }
        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = projects.map(p => `
                <div class="glass rounded-3xl overflow-hidden flex flex-col border border-white/5">
                    <img src="${p.image}" class="w-full aspect-[4/5] object-cover">
                    <div class="p-8 space-y-6">
                        <div class="flex justify-between items-center"><span class="text-[8px] font-900 uppercase px-2 py-1 border border-white/10 rounded ${p.type === 'Commission' ? 'text-red-500 border-red-500/30' : 'text-zinc-500'}">${p.type}</span><span class="text-xs font-900 text-red-600 italic tracking-tighter">${p.percentage}%</span></div>
                        <h3 class="text-2xl font-900 uppercase italic tracking-tighter leading-tight">${p.name}</h3>
                        <div class="space-y-2 pt-4 border-t border-white/5">${(p.recipe || []).map(paint => `<div class="flex items-center text-[10px] text-zinc-400 font-bold uppercase tracking-wide"><span class="text-[7px] px-1.5 py-0.5 rounded border mr-3 tag-${paint.type}">${paint.type}</span>${paint.name}</div>`).join('')}</div>
                    </div>
                </div>
            `).join('');
        }
        function renderAdminList() { const list = document.getElementById('admin-list'); list.innerHTML = projects.map((p, i) => `<div class="p-4 bg-white/5 rounded-xl border border-white/5 cursor-pointer hover:border-red-600 mb-2" onclick="editProject(${i})"><span class="text-[10px] font-bold uppercase tracking-widest">${p.name}</span></div>`).join(''); }
        function editProject(idx) { editingIndex = idx; const p = projects[idx]; document.getElementById('edit-name').value = p.name; document.getElementById('edit-img').value = p.image; document.getElementById('edit-perc').value = p.percentage; document.getElementById('val').innerText = p.percentage + '%'; currentRecipe = p.recipe || []; setEditType(p.type); renderRecipeEditor(); }
        function addPaint() { const type = document.getElementById('paint-type').value; const name = document.getElementById('paint-name').value; if(!name) return; currentRecipe.push({type, name}); document.getElementById('paint-name').value = ''; renderRecipeEditor(); }
        function renderRecipeEditor() { document.getElementById('paint-list-editor').innerHTML = currentRecipe.map((p,i) => `<div class="flex justify-between text-[10px] bg-white/5 p-2 rounded border border-white/5 mb-1"><span>${p.type}: ${p.name}</span><button onclick="currentRecipe.splice(${i},1);renderRecipeEditor()">✕</button></div>`).join(''); }
        function setEditType(t) { currentEditType = t; document.getElementById('btn-p').classList.toggle('active-type', t === 'Personal'); document.getElementById('btn-c').classList.toggle('active-type', t === 'Commission'); }
        
        loadData();
    </script>
</body>
</html>
