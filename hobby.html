<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Workbench | The Dutty Brush</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); }
        .admin-trigger { position: fixed; bottom: 15px; right: 15px; opacity: 0.05; cursor: pointer; font-weight: 900; font-size: 10px; z-index: 50; }
        .admin-trigger:hover { opacity: 1; color: #dc2626; }
        #admin-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .tag-primer { color: #a1a1aa; border-color: #3f3f46; }
        .tag-base { color: #fca5a5; border-color: #991b1b; }
        .tag-layer { color: #93c5fd; border-color: #1e40af; }
        .tag-highlight { color: #86efac; border-color: #166534; }
        .active-type { background: #dc2626 !important; border-color: #dc2626 !important; }
    </style>
</head>
<body>

    <main class="max-w-6xl mx-auto p-8 space-y-12">
        <header class="flex justify-between items-end border-b border-white/10 pb-8">
            <h1 class="text-4xl font-black italic uppercase tracking-tighter leading-none">The <span class="text-red-600">Workbench</span></h1>
            <a href="index.html" class="text-[10px] font-black uppercase tracking-widest opacity-50 hover:opacity-100 transition">Return Hub</a>
        </header>

        <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div class="admin-trigger" onclick="toggleAdmin()">D</div>

    <div id="admin-panel">
        <div class="glass p-8 rounded-3xl w-full max-w-5xl space-y-8 relative max-h-[90vh] overflow-y-auto">
            <button onclick="toggleAdmin()" class="absolute top-6 right-6 text-zinc-500">✕ Close</button>
            <div class="grid lg:grid-cols-2 gap-10 text-left">
                <div class="space-y-4">
                    <h2 class="text-2xl font-black italic uppercase text-red-600">Forge Admin</h2>
                    <input type="text" id="edit-name" placeholder="Project Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                    <div class="flex gap-2">
                        <button id="btn-p" onclick="setEditType('Personal')" class="flex-1 py-3 glass rounded-xl text-[10px] font-black uppercase active-type">Personal</button>
                        <button id="btn-c" onclick="setEditType('Commission')" class="flex-1 py-3 glass rounded-xl text-[10px] font-black uppercase">Commission</button>
                    </div>
                    <input type="text" id="edit-img" placeholder="Cloudinary Link" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                    
                    <div class="p-4 bg-white/5 rounded-2xl border border-white/5 space-y-3">
                        <p class="text-[9px] font-black uppercase text-zinc-500">Add Paint to Recipe</p>
                        <div id="paint-list" class="space-y-1 pb-2"></div>
                        <div class="flex gap-2">
                            <select id="paint-type" class="bg-zinc-900 text-xs p-2 rounded border border-white/10 text-white"><option value="primer">Primer</option><option value="base">Base</option><option value="layer">Layer</option><option value="highlight">Highlight</option></select>
                            <input type="text" id="paint-name" placeholder="Paint Name" class="flex-1 bg-zinc-900 text-xs p-2 rounded border border-white/10 outline-none">
                            <button onclick="addPaint()" class="bg-red-600 px-4 rounded font-bold text-white">+</button>
                        </div>
                    </div>
                    <input type="range" id="edit-perc" class="w-full accent-red-600" oninput="document.getElementById('val').innerText = this.value + '%'">
                    <span id="val" class="block text-center text-xs font-bold">50%</span>
                    <button onclick="applyChanges()" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase text-xs">Copy Updated JSON</button>
                </div>

                <div class="space-y-4 border-l border-white/5 pl-10">
                    <h2 class="text-2xl font-black italic uppercase text-zinc-500">Project History</h2>
                    <div id="admin-list" class="space-y-2 overflow-y-auto max-h-[500px] pr-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let projects = []; let editingIndex = null; let currentEditType = "Personal"; let currentRecipe = [];

        async function loadData() {
            const r = await fetch('data.json?t=' + Date.now());
            projects = await r.json();
            renderGallery();
        }

        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = projects.map(p => `
                <div class="glass rounded-3xl overflow-hidden flex flex-col border-white/5">
                    <img src="${p.image}" class="w-full aspect-[4/5] object-cover">
                    <div class="p-6 space-y-4">
                        <div class="flex justify-between items-center"><span class="text-[8px] font-black uppercase px-2 py-1 border border-white/10 rounded ${p.type === 'Commission' ? 'text-red-500' : 'text-zinc-500'}">${p.type}</span><span class="text-xs font-bold text-red-600 italic">${p.percentage}%</span></div>
                        <h3 class="text-xl font-black uppercase italic tracking-tighter">${p.name}</h3>
                        <div class="space-y-1.5 pt-2 border-t border-white/5">
                            ${(p.recipe || []).map(paint => `<div class="flex items-center text-[10px] text-zinc-400"><span class="text-[7px] px-1.5 py-0.5 rounded font-black uppercase mr-2 border tag-${paint.type}">${paint.type}</span> ${paint.name}</div>`).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleAdmin() {
            const p = document.getElementById('admin-panel');
            p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
            if(p.style.display === 'flex') renderAdminList();
        }

        function renderAdminList() {
            const list = document.getElementById('admin-list');
            list.innerHTML = projects.map((p, i) => `<div class="flex justify-between p-4 bg-white/5 rounded-xl border border-white/5 cursor-pointer hover:border-red-600" onclick="editProject(${i})"><span class="text-xs font-bold uppercase truncate pr-2">${p.name}</span><span class="text-xs font-black text-red-600">${p.percentage}%</span></div>`).join('');
        }

        function editProject(idx) {
            editingIndex = idx; const p = projects[idx];
            document.getElementById('edit-name').value = p.name;
            document.getElementById('edit-img').value = p.image;
            document.getElementById('edit-perc').value = p.percentage;
            document.getElementById('val').innerText = p.percentage + '%';
            currentRecipe = p.recipe || []; setEditType(p.type); renderRecipeEditor();
        }

        function addPaint() {
            const type = document.getElementById('paint-type').value;
            const name = document.getElementById('paint-name').value;
            if(!name) return; currentRecipe.push({type, name});
            document.getElementById('paint-name').value = ''; renderRecipeEditor();
        }

        function renderRecipeEditor() {
            document.getElementById('paint-list').innerHTML = currentRecipe.map((p,i) => `<div class="flex justify-between text-[10px] bg-black/50 p-2 rounded"><span>${p.type}: ${p.name}</span><button onclick="currentRecipe.splice(${i},1);renderRecipeEditor()">✕</button></div>`).join('');
        }

        function setEditType(t) {
            currentEditType = t;
            document.getElementById('btn-p').classList.toggle('active-type', t === 'Personal');
            document.getElementById('btn-c').classList.toggle('active-type', t === 'Commission');
        }

        function applyChanges() {
            const update = { name: document.getElementById('edit-name').value, percentage: parseInt(document.getElementById('edit-perc').value), type: currentEditType, image: document.getElementById('edit-img').value, recipe: currentRecipe };
            if(editingIndex !== null) projects[editingIndex] = update; else projects.unshift(update);
            navigator.clipboard.writeText(JSON.stringify(projects, null, 2));
            alert("JSON Copied. Paste into data.json."); renderGallery();
        }

        loadData();
    </script>
</body>
</html>
