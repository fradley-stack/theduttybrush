<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dutty Brush | Workbench</title>
    
    <link rel="icon" type="image/jpeg" href="avatar.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; scroll-behavior: smooth; }
        .hero-gradient { background: radial-gradient(circle at center, #111111 0%, #050505 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); }
        .accent-red { color: #ff3e3e; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; backdrop-filter: blur(20px); overflow-y: auto; }
        
        .tag-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .filter-btn { 
            padding: 6px 14px; border-radius: 8px; font-size: 9px; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 0.05em; border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.02); color: #555; transition: all 0.2s ease;
        }
        .filter-btn.active { background: #ff3e3e; color: white; border-color: #ff3e3e; }

        .forge-input { background: #000 !important; border: 1px solid rgba(255,255,255,0.2) !important; color: #fff !important; padding: 12px 16px; border-radius: 10px; outline: none; width: 100%; }
        
        label { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em; color: #444; margin-bottom: 6px; display: block; }

        .thumb-container { height: 340px; overflow: hidden; background: #000; position: relative; border-radius: 32px 32px 0 0; }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: transform 0.5s; }
        .group:hover .thumb-img { transform: scale(1.05); opacity: 1; }

        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        #lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .dynamic-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: rgba(255,255,255,0.02); padding: 6px; border-radius: 12px; }
        .btn-del { color: #555; padding: 0 10px; cursor: pointer; }
        .btn-del:hover { color: #ff3e3e; }
    </style>
</head>
<body class="hero-gradient min-h-screen p-4 md:p-12">

    <div id="lightbox" onclick="this.style.display='none'"><img id="lightbox-img" src=""></div>

    <div id="project-modal" class="modal-overlay" onclick="closeModals()">
        <div class="max-w-6xl mx-auto my-8 p-4" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h2 id="view-title" class="text-2xl font-900 uppercase italic tracking-tighter"></h2>
                <button onclick="closeModals()" class="text-zinc-600 uppercase text-[10px] font-black">Close</button>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-7 space-y-4">
                    <img id="main-view-img" src="" class="w-full rounded-2xl cursor-zoom-in" onclick="openLightbox(this.src)">
                    <div id="view-gallery-grid" class="grid grid-cols-4 gap-2"></div>
                </div>
                <div class="lg:col-span-5">
                    <div class="glass-card p-6 rounded-2xl space-y-6">
                        <div class="flex justify-between border-b border-white/5 pb-4">
                            <div><label>Faction</label><span id="view-faction" class="text-xs font-black accent-red uppercase"></span></div>
                            <div class="text-right"><label>Progress</label><span id="view-progress" class="text-2xl font-900 italic"></span></div>
                        </div>
                        <div><label>Notes</label><p id="view-notes" class="text-zinc-400 text-sm"></p></div>
                        <div><label>Recipe</label><div id="view-paints-list" class="space-y-3"></div></div>
                        <div id="admin-controls" class="hidden pt-4">
                            <button onclick="editProject()" class="w-full bg-white text-black text-[10px] font-900 uppercase py-4 rounded-xl">Enter Forge</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="modal-overlay" onclick="closeModals()">
        <div class="max-w-2xl mx-auto my-8 p-6 bg-[#0a0a0a] rounded-[32px] border border-white/10" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-900 uppercase italic">The <span class="accent-red">Forge</span></h2>
                <button onclick="closeModals()" class="text-zinc-500 text-2xl">&times;</button>
            </div>
            
            <div class="mb-8">
                <label>Select Project to Edit</label>
                <select id="project-selector" onchange="loadProjectIntoForge(this.value)" class="forge-input">
                    <option value="">+ New Project</option>
                </select>
            </div>

            <form id="forge-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label>Title</label><input type="text" id="f-title" required class="forge-input"></div>
                    <div><label>Faction</label><select id="f-faction" class="forge-input"></select></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label>Progress %</label><input type="number" id="f-progress" class="forge-input"></div>
                    <div><label>Thumbnail URL</label><input type="text" id="f-thumb" required class="forge-input"></div>
                </div>
                <div>
                    <div class="flex justify-between mb-2"><label>Gallery</label><button type="button" onclick="addDynamicField('gallery-fields')" class="text-white bg-white/10 px-2 rounded">+</button></div>
                    <div id="gallery-fields" class="space-y-2"></div>
                </div>
                <div>
                    <div class="flex justify-between mb-2"><label>Paints</label><button type="button" onclick="addDynamicField('paint-fields', true)" class="text-white bg-white/10 px-2 rounded">+</button></div>
                    <div id="paint-fields" class="space-y-2"></div>
                </div>
                <div><label>Notes</label><textarea id="f-notes" rows="2" class="forge-input"></textarea></div>
                <button type="submit" class="w-full bg-red-600 py-4 rounded-xl font-900 uppercase text-xs tracking-widest">Sync Changes</button>
            </form>
        </div>
    </div>

    <header class="max-w-5xl mx-auto flex justify-between items-center mb-8">
        <a href="index.html" class="text-[10px] font-900 uppercase tracking-widest text-zinc-600 hover:text-white transition flex items-center gap-2">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back
        </a>
        <h1 class="text-xl font-900 uppercase italic tracking-tighter">Studio <span class="accent-red">Workbench</span></h1>
        <button id="admin-btn" onclick="handleAdminClick()" class="text-[10px] font-900 uppercase tracking-widest text-zinc-800 hover:text-red-500 transition">Login</button>
    </header>

    <main class="max-w-5xl mx-auto">
        <input type="text" id="search-units" placeholder="Search projects..." oninput="searchProjects(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none mb-4">
        <div id="filter-container" class="tag-grid mb-8">
            <button onclick="filterFaction('all', this)" class="filter-btn active">All</button>
        </div>
        <div id="workbench-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </main>

    <script>
        const GITHUB_USER = "fradley-stack"; 
        const GITHUB_REPO = "theduttybrush";
        const GITHUB_PATH = "data.json";
        const factions = ["Adeptus Astartes", "Chaos Space Marines", "Aeldari", "Necrons", "Orks", "Tyranids", "T'au Empire", "Leagues of Votann", "Astra Militarum", "Adepta Sororitas", "Adeptus Custodes", "Adeptus Mechanicus", "Grey Knights", "Death Guard", "World Eaters", "Thousand Sons", "Drukhari", "Genestealer Cults", "Imperial Knights", "Chaos Knights"];
        
        let allProjectData = [];
        let currentEditTitle = null;

        function closeModals() { 
            document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); 
            document.body.style.overflow = 'auto'; 
        }

        async function loadData() {
            try {
                const res = await fetch('data.json?v=' + Date.now());
                allProjectData = await res.json();
                renderProjects(allProjectData);
                populateForgeElements();
            } catch (err) { console.error(err); }
        }

        function populateForgeElements() {
            const fForge = document.getElementById('f-faction');
            fForge.innerHTML = factions.sort().map(f => `<option value="${f}">${f}</option>`).join('');
            
            const sel = document.getElementById('project-selector');
            sel.innerHTML = '<option value="">+ New Project</option>';
            allProjectData.forEach(p => {
                const name = p.title || p.name;
                sel.innerHTML += `<option value="${name}">${name}</option>`;
            });

            const filterCont = document.getElementById('filter-container');
            factions.sort().forEach(f => {
                const btn = document.createElement('button');
                btn.className = "filter-btn";
                btn.innerText = f;
                btn.onclick = (e) => filterFaction(f, e.target);
                filterCont.appendChild(btn);
            });
        }

        function renderProjects(data) {
            const list = document.getElementById('workbench-list');
            list.innerHTML = '';
            data.forEach(p => {
                const title = p.title || p.name;
                const prog = p.progress || 0;
                list.innerHTML += `
                    <div onclick="openProjectModal('${title}')" class="glass-card rounded-[32px] overflow-hidden group cursor-pointer border border-transparent hover:border-white/10 transition-all">
                        <div class="thumb-container">
                            <img src="${p.thumbnail}" class="thumb-img">
                            <div class="absolute top-4 left-4"><span class="text-[8px] px-2 py-1 rounded bg-black/60 font-black uppercase text-white tracking-widest">${p.faction}</span></div>
                        </div>
                        <div class="p-6">
                            <div class="flex justify-between items-end"><h3 class="font-900 uppercase italic text-white group-hover:text-red-500 transition-colors">${title}</h3><span class="text-xs font-black italic text-zinc-600">${prog}%</span></div>
                            <div class="w-full bg-white/5 h-[2px] mt-4 rounded-full overflow-hidden"><div class="bg-red-600 h-full transition-all duration-1000" style="width: ${prog}%"></div></div>
                        </div>
                    </div>`;
            });
        }

        function openProjectModal(title) {
            const p = allProjectData.find(x => (x.title || x.name) === title);
            if (!p) return;
            document.getElementById('view-title').innerText = title;
            document.getElementById('view-faction').innerText = p.faction;
            document.getElementById('view-progress').innerText = `${p.progress}%`;
            document.getElementById('view-notes').innerText = p.notes || "";
            document.getElementById('main-view-img').src = p.thumbnail;
            
            const gal = document.getElementById('view-gallery-grid');
            gal.innerHTML = (p.gallery || []).map(src => `<img src="${src}" class="w-full aspect-square object-cover rounded-lg" onclick="openLightbox('${src}')">`).join('');
            
            const paints = document.getElementById('view-paints-list');
            paints.innerHTML = Object.entries(p.paints || {}).map(([k, v]) => `<div class="border-l border-red-600/30 pl-3"><label class="mb-0 text-zinc-600">${k}</label><p class="text-xs text-zinc-300">${v}</p></div>`).join('');
            
            if (sessionStorage.getItem('gh_token')) document.getElementById('admin-controls').classList.remove('hidden');
            document.getElementById('project-modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function editProject() {
            const title = document.getElementById('view-title').innerText;
            loadProjectIntoForge(title);
            document.getElementById('project-selector').value = title;
            document.getElementById('project-modal').style.display = 'none';
            document.getElementById('admin-modal').style.display = 'block';
        }

        function loadProjectIntoForge(title) {
            const p = allProjectData.find(x => (x.title || x.name) === title);
            document.getElementById('gallery-fields').innerHTML = '';
            document.getElementById('paint-fields').innerHTML = '';
            
            if (!p) { 
                document.getElementById('forge-form').reset(); 
                currentEditTitle = null; 
                return; 
            }
            
            currentEditTitle = title;
            document.getElementById('f-title').value = title;
            document.getElementById('f-progress').value = p.progress;
            document.getElementById('f-faction').value = p.faction;
            document.getElementById('f-thumb').value = p.thumbnail;
            document.getElementById('f-notes').value = p.notes || "";
            
            if (p.gallery) p.gallery.forEach(url => addDynamicField('gallery-fields', false, url));
            if (p.paints) Object.entries(p.paints).forEach(([k, v]) => addDynamicField('paint-fields', true, k, v));
        }

        function addDynamicField(cid, isPaint = false, v1 = '', v2 = '') {
            const div = document.createElement('div');
            div.className = "flex gap-2";
            if (isPaint) {
                div.innerHTML = `<input type="text" value="${v1}" placeholder="Part" class="forge-input w-1/3 p-cat"><input type="text" value="${v2}" placeholder="Colors" class="forge-input w-2/3 p-val"><button type="button" onclick="this.parentElement.remove()" class="btn-del">&times;</button>`;
            } else {
                div.innerHTML = `<input type="text" value="${v1}" placeholder="URL" class="forge-input g-input"><button type="button" onclick="this.parentElement.remove()" class="btn-del">&times;</button>`;
            }
            document.getElementById(cid).appendChild(div);
        }

        document.getElementById('forge-form').onsubmit = async (e) => {
            e.preventDefault();
            const token = sessionStorage.getItem('gh_token');
            const paints = {};
            document.querySelectorAll('#paint-fields .flex').forEach(row => {
                const k = row.querySelector('.p-cat').value;
                const v = row.querySelector('.p-val').value;
                if (k) paints[k] = v;
            });

            const updated = {
                title: document.getElementById('f-title').value,
                faction: document.getElementById('f-faction').value,
                progress: parseInt(document.getElementById('f-progress').value),
                thumbnail: document.getElementById('f-thumb').value,
                notes: document.getElementById('f-notes').value,
                gallery: Array.from(document.querySelectorAll('.g-input')).map(i => i.value).filter(v => v),
                paints: paints
            };

            if (currentEditTitle) {
                const idx = allProjectData.findIndex(p => (p.title || p.name) === currentEditTitle);
                allProjectData[idx] = updated;
            } else {
                allProjectData.push(updated);
            }

            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const fileData = await res.json();
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(allProjectData, null, 2))));
                
                const push = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Forge Update: ${updated.title}`, content, sha: fileData.sha })
                });

                if (push.ok) location.reload();
            } catch (err) { alert("Sync Error"); }
        };

        function handleAdminClick() {
            const token = sessionStorage.getItem('gh_token') || prompt("Token:");
            if (token) { 
                sessionStorage.setItem('gh_token', token); 
                document.getElementById('admin-modal').style.display = 'block'; 
                document.getElementById('admin-btn').innerText = "Forge Access";
            }
        }

        function filterFaction(f, el) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            renderProjects(f === 'all' ? allProjectData : allProjectData.filter(p => p.faction === f));
        }

        function searchProjects(q) {
            const filtered = allProjectData.filter(p => (p.title || p.name).toLowerCase().includes(q.toLowerCase()));
            renderProjects(filtered);
        }

        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        loadData();
    </script>
</body>
</html>
