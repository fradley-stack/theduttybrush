<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dutty Brush | Workbench</title>
    
    <link rel="icon" type="image/jpeg" href="avatar.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; scroll-behavior: smooth; }
        .hero-gradient { background: radial-gradient(circle at center, #111111 0%, #050505 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .accent-red { color: #ff3e3e; }
        
        /* Highlight effect for when jumping from an anchor link */
        :target {
            border-color: #ff3e3e !important;
            box-shadow: 0 0 20px rgba(255, 62, 62, 0.2);
            transition: all 0.5s ease;
        }
    </style>
</head>
<body class="hero-gradient min-h-screen p-6">

    <header class="max-w-4xl mx-auto flex justify-between items-center mb-12">
        <a href="index.html" class="text-[10px] font-900 uppercase tracking-[0.3em] text-zinc-500 hover:text-white transition flex items-center gap-2">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Return to Studio
        </a>
        <h1 class="text-xl font-900 uppercase italic tracking-tighter">STUDIO <span class="accent-red">WORKBENCH</span></h1>
    </header>

    <main class="max-w-4xl mx-auto">
        <div id="workbench-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>

        <div id="empty-state" class="hidden text-center py-20">
            <p class="text-zinc-600 text-[10px] font-black uppercase tracking-[0.5em]">The forge is cold. No active projects.</p>
        </div>
    </main>

    <footer class="max-w-4xl mx-auto mt-20 pb-12 text-center opacity-20">
        <p class="text-[8px] font-black uppercase tracking-[0.5em]">Workbench v2.1.0-Forge</p>
    </footer>

    <script>
        // Slugifier to create IDs that match the Home Page links
        function createSlug(text) {
            return text.toString().toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/(^-|-$)/g, '');
        }

        async function loadWorkbench() {
            try {
                const res = await fetch('data.json?v=' + Date.now(), { cache: "no-store" });
                if (!res.ok) throw new Error('Failed to load data.json');
                const data = await res.json();
                
                const container = document.getElementById('workbench-list');
                const emptyState = document.getElementById('empty-state');
                
                if (data.length === 0) {
                    emptyState.classList.remove('hidden');
                    return;
                }

                container.innerHTML = '';

                data.forEach(project => {
                    // Mapping fields for consistency
                    const title = project.title || project.name || "Untitled";
                    const progress = project.progress || project.percentage || 0;
                    const category = project.category || project.type || "Hobby";
                    const thumb = project.thumbnail || project.image || 'avatar.jpg';
                    const link = project.link || project.url || "#";
                    
                    const slug = createSlug(title);
                    const isCommission = category === "Commission";

                    const card = document.createElement('div');
                    // APPLYING THE ID HERE FOR ANCHOR LINKS
                    card.id = slug;
                    card.className = "glass-card rounded-2xl overflow-hidden flex flex-col group transition-all duration-500 border-zinc-800/50";

                    card.innerHTML = `
                        <div class="relative h-48 overflow-hidden bg-black">
                            <img src="${thumb}" alt="${title}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700 opacity-60 group-hover:opacity-100">
                            <div class="absolute top-4 left-4">
                                <span class="text-[8px] px-2 py-1 rounded bg-black/80 backdrop-blur-md border border-white/10 font-black uppercase tracking-widest ${isCommission ? 'text-red-500' : 'text-zinc-400'}">
                                    ${category}
                                </span>
                            </div>
                            <div class="absolute bottom-4 right-4 bg-black/80 backdrop-blur-md border border-white/10 px-3 py-1 rounded-full">
                                <span class="text-[10px] font-black text-white">${progress}%</span>
                            </div>
                        </div>
                        <div class="p-6 space-y-4">
                            <div>
                                <h3 class="text-sm font-900 uppercase italic tracking-tighter text-white group-hover:text-red-500 transition-colors">
                                    ${title}
                                </h3>
                                <div class="w-full bg-white/5 h-[2px] mt-4 overflow-hidden">
                                    <div class="bg-red-600 h-full transition-all duration-1000" style="width: ${progress}%"></div>
                                </div>
                            </div>
                            <div class="flex justify-between items-center pt-2">
                                <a href="${link}" class="text-[9px] font-black uppercase tracking-widest text-zinc-500 hover:text-white transition">View Details</a>
                                <div class="flex gap-2">
                                    <div class="w-1.5 h-1.5 rounded-full ${progress < 100 ? 'bg-green-500 animate-pulse' : 'bg-zinc-700'}"></div>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

                // Small delay to ensure rendering is done before jumping to anchor
                if (window.location.hash) {
                    setTimeout(() => {
                        const target = document.querySelector(window.location.hash);
                        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 100);
                }

            } catch (e) {
                console.error("Workbench load failed:", e);
            }
        }

        loadWorkbench();
    </script>
</body>
</html>
