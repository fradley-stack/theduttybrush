<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dutty Brush | Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        
        /* The Glowing Commission Button */
        .glow-btn { 
            position: relative;
            background: #dc2626;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.4);
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 10px rgba(220, 38, 38, 0.4); }
            50% { box-shadow: 0 0 25px rgba(220, 38, 38, 0.7); }
            100% { box-shadow: 0 0 10px rgba(220, 38, 38, 0.4); }
        }
        .glow-btn:hover { background: #ef4444; transform: scale(1.02); }
        .closed { background: #27272a; box-shadow: none; animation: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <main class="max-w-md w-full text-center space-y-6">
        <div class="mb-8">
            <h1 class="text-4xl font-black italic uppercase tracking-tighter leading-none">THE <span class="text-red-600">DUTTY</span> BRUSH</h1>
            <p class="text-[9px] uppercase tracking-[0.4em] text-zinc-500 font-bold mt-2">Grimdark Miniature Studio</p>
        </div>

        <div class="grid gap-3">
            <a href="mailto:your-email@example.com?subject=Commission Request" id="comm-btn" class="glow-btn py-5 rounded-2xl font-black uppercase text-xs tracking-widest text-white block">
                Commissions Open
            </a>

            <a href="hobby.html" class="glass py-4 rounded-xl font-bold uppercase text-[10px] hover:bg-zinc-900 transition flex justify-between px-6 items-center">
                <span>Enter Workbench</span> <span class="opacity-30">→</span>
            </a>

            <a href="https://www.facebook.com/profile.php?id=61582895284714" target="_blank" class="glass py-4 rounded-xl font-bold uppercase text-[10px] hover:bg-zinc-900 transition flex justify-between px-6 items-center">
                <span>Facebook</span> <span class="opacity-30">→</span>
            </a>

            <a href="https://instagram.com/duttyclem" target="_blank" class="glass py-4 rounded-xl font-bold uppercase text-[10px] hover:bg-zinc-900 transition flex justify-between px-6 items-center">
                <span>Instagram</span> <span class="opacity-30">→</span>
            </a>

            <a href="https://www.tiktok.com/@theduttybrush" target="_blank" class="glass py-4 rounded-xl font-bold uppercase text-[10px] hover:bg-zinc-900 transition flex justify-between px-6 items-center">
                <span>TikTok</span> <span class="opacity-30">→</span>
            </a>
        </div>

        <div id="forge-card" class="hidden glass p-5 rounded-2xl text-left space-y-3 border-l-4 border-l-zinc-800">
            <div class="flex justify-between items-end">
                <div class="flex flex-col gap-1">
                    <span id="p-tag" class="text-[8px] px-2 py-0.5 rounded font-black uppercase tracking-tighter border"></span>
                    <span class="text-[9px] uppercase font-bold text-zinc-600 tracking-widest">Live in the Forge</span>
                </div>
                <span id="p-percent" class="text-sm font-black text-red-600 italic">0%</span>
            </div>
            <div class="w-full bg-zinc-950 h-1.5 rounded-full overflow-hidden">
                <div id="p-bar" class="bg-red-600 h-full transition-all duration-1000" style="width: 0%"></div>
            </div>
            <p id="p-name" class="text-[10px] text-zinc-400 font-bold uppercase italic tracking-widest"></p>
        </div>
    </main>

    <script>
        async function init() {
            try {
                const r = await fetch('data.json?t=' + Date.now());
                const data = await r.json();
                const p = data[0];
                if(p) {
                    document.getElementById('forge-card').classList.remove('hidden');
                    document.getElementById('p-name').innerText = p.name;
                    document.getElementById('p-percent').innerText = p.percentage + '%';
                    document.getElementById('p-bar').style.width = p.percentage + '%';
                    
                    const tag = document.getElementById('p-tag');
                    tag.innerText = p.type || "Personal";
                    tag.className = p.type === "Commission" 
                        ? "text-[8px] px-2 py-0.5 rounded font-black uppercase tracking-tighter border border-red-600/50 text-red-500 bg-red-500/5"
                        : "text-[8px] px-2 py-0.5 rounded font-black uppercase tracking-tighter border border-white/10 text-zinc-500 bg-white/5";

                    // Handle Glow Button State (optional: add 'status' to JSON later if you want to automate this)
                    const commBtn = document.getElementById('comm-btn');
                    // commBtn.innerText = "Commissions Closed"; // Toggle logic if needed
                    // commBtn.classList.add('closed');
                }
            } catch(e) {}
        }
        init();
    </script>
</body>
</html>
