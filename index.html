<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dutty Brush | Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; }
        .hero-gradient { background: radial-gradient(circle at center, #111111 0%, #050505 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .accent-red { color: #ff3e3e; }
        .progress-glow { box-shadow: 0 0 15px rgba(220, 38, 38, 0.4); }
        .glow-dot { width: 6px; height: 6px; background-color: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="hero-gradient min-h-screen flex flex-col items-center justify-center p-6">

    <main class="max-w-md w-full text-center space-y-8">
        <div class="space-y-4">
            <img src="avatar.jpg" class="w-20 h-20 rounded-full mx-auto border border-white/10 shadow-2xl object-cover">
            <h1 class="text-4xl font-900 uppercase italic tracking-tighter">THE <span class="accent-red">DUTTY</span> BRUSH</h1>
            
            <a href="mailto:theduttybrush@gmail.com?subject=Commission Request&body=Project Name:%0D%0AQuantity:%0D%0ADeadline (approx):" class="flex items-center justify-center gap-2 group transition cursor-pointer">
                <div class="glow-dot"></div>
                <span class="text-[9px] font-black uppercase tracking-[0.2em] text-zinc-500 group-hover:text-white">Commissions Open</span>
            </a>
        </div>

        <div class="flex flex-col gap-3">
            <a href="https://www.tiktok.com/@theduttybrush" target="_blank" class="glass-card py-4 px-6 rounded-xl flex items-center justify-between hover:bg-zinc-900 transition">
                <span class="text-[10px] font-bold uppercase tracking-widest">TikTok</span>
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#fff" d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.06-2.89-.44-4.13-1.19-.13 3.47-.11 6.94-.15 10.41-.03 1.54-.47 3.12-1.5 4.31-1.29 1.52-3.39 2.31-5.38 2.21-2.03-.09-4.01-1.07-5.12-2.77-1.18-1.78-1.25-4.13-.3-5.99.9-1.84 2.82-3.08 4.87-3.23.1-.01.21-.01.31-.01v4.03c-.98.07-1.99.55-2.55 1.36-.58.8-.57 1.95-.03 2.77.53.84 1.53 1.29 2.5 1.25 1.05-.03 2.05-.62 2.47-1.58.2-.47.28-.99.27-1.5-.01-3.69-.01-7.39-.01-11.09-1.3-.01-2.6-.01-3.9 0V.02z" style="filter: drop-shadow(2px 0px 0px #FD2C55) drop-shadow(-2px 0px 0px #24F2FF);"/></svg>
            </a>
            <a href="https://instagram.com/duttyclem" target="_blank" class="glass-card py-4 px-6 rounded-xl flex items-center justify-between hover:bg-zinc-900 transition">
                <span class="text-[10px] font-bold uppercase tracking-widest">Instagram</span>
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="w-5 h-5">
            </a>
            <a href="https://www.facebook.com/profile.php?id=61582895284714" target="_blank" class="glass-card py-4 px-6 rounded-xl flex items-center justify-between hover:bg-zinc-900 transition">
                <span class="text-[10px] font-bold uppercase tracking-widest">Facebook</span>
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" class="w-5 h-5">
            </a>
            <a href="https://baselair.com/theduttybrush" target="_blank" class="glass-card py-4 px-6 rounded-xl flex items-center justify-between hover:bg-zinc-900 transition">
                <span class="text-[10px] font-bold uppercase tracking-widest">Baselair</span>
                <img src="https://baselair.com/favicon.ico" class="w-5 h-5 rounded-sm">
            </a>
        </div>

        <div id="forge-card" class="glass-card p-5 rounded-xl border border-zinc-800/50 text-left space-y-3 hidden">
            <div class="flex justify-between items-end">
                <div class="flex flex-col">
                    <span id="project-tag" class="text-[7px] px-1.5 py-0.5 rounded bg-white/5 text-zinc-500 uppercase font-black w-fit border border-white/5 mb-1">TYPE</span>
                    <span class="text-[8px] uppercase font-bold text-zinc-500 tracking-widest">Live in the Forge</span>
                </div>
                <span id="progress-text" class="text-[10px] font-bold text-red-500">0%</span>
            </div>
            <div class="w-full bg-black h-1 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-red-600 h-full progress-glow transition-all duration-700" style="width: 0%"></div>
            </div>
            <p id="project-name" class="text-[9px] text-zinc-400 uppercase font-semibold italic">Current Project</p>
        </div>

        <a href="hobby.html" class="bg-white text-black py-4 rounded-xl text-[10px] font-900 uppercase tracking-[0.3em] hover:bg-red-600 hover:text-white transition-all block text-center">Enter Workbench</a>
    </main>

    <script>
        async function syncForge() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                const data = await res.json();
                const active = data[0];
                if (active) {
                    document.getElementById('forge-card').classList.remove('hidden');
                    document.getElementById('project-name').innerText = `Current: "${active.name}"`;
                    document.getElementById('progress-text').innerText = `${active.percentage}%`;
                    document.getElementById('progress-bar').style.width = `${active.percentage}%`;
                    const tag = document.getElementById('project-tag');
                    tag.innerText = active.type || "Personal";
                    if (active.type === "Commission") tag.classList.add('text-red-500');
                }
            } catch (e) { console.log("Forge sync skipped."); }
        }
        syncForge();
    </script>
</body>
</html>
