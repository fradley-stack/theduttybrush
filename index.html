<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dutty Brush | Studio</title>
    
    <link rel="icon" type="image/jpeg" href="avatar.jpg">
    <link rel="apple-touch-icon" href="avatar.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; }
        .hero-gradient { background: radial-gradient(circle at center, #111111 0%, #050505 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .accent-red { color: #ff3e3e; }
        .progress-glow { box-shadow: 0 0 15px rgba(220, 38, 38, 0.4); }
        
        .glow-dot { width: 8px; height: 8px; background-color: #22c55e; border-radius: 50%; box-shadow: 0 0 12px #22c55e; animation: pulse 2s infinite; }
        @keyframes pulse { 
            0% { opacity: 1; transform: scale(1); } 
            50% { opacity: 0.5; transform: scale(1.2); } 
            100% { opacity: 1; transform: scale(1); } 
        }

        #toast { visibility: hidden; min-width: 180px; background-color: #ff3e3e; color: #fff; text-align: center; border-radius: 8px; padding: 10px; position: fixed; z-index: 100; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="hero-gradient min-h-screen flex flex-col items-center p-6 pt-12 md:pt-24">

    <div id="toast">Email Copied to Clipboard</div>

    <main class="max-w-md w-full text-center space-y-8 mb-20">
        <div class="space-y-5">
            <img src="avatar.jpg" alt="The Dutty Brush" class="w-24 h-24 rounded-full mx-auto border border-white/10 shadow-2xl object-cover hover:scale-105 transition-transform duration-500">
            <h1 class="text-4xl font-900 uppercase italic tracking-tighter leading-none">THE <span class="accent-red">DUTTY</span> BRUSH</h1>
            
            <div class="flex items-center justify-center gap-3 group transition py-1">
                <div class="glow-dot"></div>
                <span class="text-[10px] font-black uppercase tracking-[0.3em] text-white">Commissions Open</span>
            </div>
        </div>

        <div class="flex flex-col gap-3">
            <a href="hobby.html" class="relative bg-white text-black py-6 rounded-xl text-[11px] font-900 uppercase tracking-[0.3em] hover:bg-red-600 hover:text-white transition-all block shadow-lg group">
                Enter Workbench
                <span id="workbench-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-[8px] font-black px-2 py-1 rounded border-2 border-[#050505] hidden">0 ACTIVE</span>
            </a>

            <div class="glass-card rounded-xl flex items-center overflow-hidden">
                <a href="mailto:commissions@theduttybrush.com?subject=Commission Inquiry - [Project Name]&body=COMMISSION DETAILS%0D%0A------------------------%0D%0AFaction/Game: %0D%0AUnit Name/Description: %0D%0AUnit Count: %0D%0A%0D%0AMINI SIZE%0D%0A(e.g. Infantry 28-32mm, Cavalry/Large 40-60mm, Monster/Vehicle 80mm+): %0D%0A%0D%0AQUALITY STANDARD%0D%0A(Tabletop / Tabletop Plus / Display / Character): %0D%0A%0D%0AADDITIONAL INFO%0D%0A- Assembly Required? (Yes/No): %0D%0A- Specific Color Scheme/Lore: %0D%0A- Specific Basing Style: %0D%0A- Deadline (if any): " class="flex-1 py-4 px-6 flex items-center justify-between hover:bg-white/5 transition group text-left">
                    <span class="text-[10px] font-bold uppercase tracking-widest">Contact Me</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-zinc-500 group-hover:text-white transition-colors"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                </a>
                <button onclick="copyEmail()" class="border-l border-white/5 py-4 px-5 hover:bg-red-600 transition-colors group" title="Copy Email">
                    <svg id="copy-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-zinc-500 group-hover:text-white">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <svg id="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-white hidden">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </button>
            </div>

            <a href="https://thebaselair.com/duttyclem" target="_blank" class="glass-card py-4 px-6 rounded-xl flex items-center justify-between hover:bg-zinc-900 transition group">
                <span class="text-[10px] font-bold uppercase tracking-widest">Baselair</span>
                <img src="baselair.png" alt="Baselair" class="w-5 h-5 rounded-sm grayscale group-hover:grayscale-0 transition-all">
            </a>

            <a href="https://instagram.com/theduttybrush" target="_blank" class="glass-card py-4 px-6 rounded-xl flex items-center justify-between hover:bg-zinc-900 transition">
                <span class="text-[10px] font-bold uppercase tracking-widest">Instagram</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
            </a>

            <a href="https://www.tiktok.com/@theduttybrush" target="_blank" class="glass-card py-4 px-6 rounded-xl flex items-center justify-between hover:bg-zinc-900 transition">
                <span class="text-[10px] font-bold uppercase tracking-widest">TikTok</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path></svg>
            </a>

            <a href="https://www.facebook.com/profile.php?id=61582895284714" target="_blank" class="glass-card py-4 px-6 rounded-xl flex items-center justify-between hover:bg-zinc-900 transition">
                <span class="text-[10px] font-bold uppercase tracking-widest">Facebook</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>
            </a>
        </div>

        <div id="forge-container" class="space-y-4"></div>
    </main>

    <footer class="w-full max-w-md border-t border-white/5 pt-8 pb-12 text-center space-y-4">
        <div>
            <h2 class="text-sm font-900 uppercase italic tracking-tighter leading-none">The <span class="text-red-600">Dutty Brush</span></h2>
            <p class="text-[8px] uppercase tracking-[0.4em] text-zinc-600 font-bold mt-1">Studio &copy; 2026</p>
        </div>
        <div class="flex justify-center gap-6 text-[8px] font-black uppercase tracking-widest text-zinc-500">
            <span>Hand-Crafted in the Studio</span>
            <span class="text-zinc-800">|</span>
            <span class="text-zinc-700">v2.1.0-Forge</span>
        </div>
    </footer>

    <script>
        function copyEmail() {
            const email = "commissions@theduttybrush.com";
            navigator.clipboard.writeText(email).then(() => {
                const toast = document.getElementById("toast");
                const copyIcon = document.getElementById("copy-icon");
                const checkIcon = document.getElementById("check-icon");
                toast.className = "show";
                copyIcon.classList.add("hidden");
                checkIcon.classList.remove("hidden");
                setTimeout(() => { 
                    toast.className = toast.className.replace("show", ""); 
                    copyIcon.classList.remove("hidden");
                    checkIcon.classList.add("hidden");
                }, 3000);
            });
        }

        async function syncForge() {
            try {
                const res = await fetch('data.json?v=' + Date.now(), {
                    cache: "no-store",
                    headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
                });
                
                if (!res.ok) throw new Error('Failed to load data.json');
                const data = await res.json();

                const activeProjects = data.filter(p => (p.progress || p.percentage) < 100);

                if (activeProjects.length > 0) {
                    const badge = document.getElementById('workbench-count');
                    badge.innerText = `${activeProjects.length} ACTIVE`;
                    badge.classList.remove('hidden');
                }

                const container = document.getElementById('forge-container');
                container.innerHTML = '';

                activeProjects.forEach(p => {
                    const title = p.title || p.name || "Untitled Project";
                    const progress = p.progress || p.percentage || 0;
                    const category = p.category || p.type || "Hobby";
                    
                    // Create a slug for the anchor (e.g., "Terminator Squad" -> "terminator-squad")
                    const projectSlug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
                    
                    // Priority: Explicit Link > Anchor in Hobby.html > General Hobby.html
                    const targetLink = p.link || p.url || `hobby.html#${projectSlug}`;
                    const thumb = p.thumbnail || p.image || 'avatar.jpg';

                    const cardWrapper = document.createElement('a');
                    cardWrapper.href = targetLink;
                    cardWrapper.className = "glass-card p-4 rounded-xl border border-zinc-800/50 text-left flex gap-4 items-center hover:bg-white/5 transition group block cursor-pointer";
                    
                    const isCommission = category === "Commission";
                    
                    cardWrapper.innerHTML = `
                        <div class="w-16 h-16 rounded-lg overflow-hidden border border-white/5 flex-shrink-0 bg-black">
                            <img src="${thumb}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" alt="${title}">
                        </div>
                        <div class="flex-1 space-y-2">
                            <div class="flex justify-between items-end">
                                <div class="flex flex-col">
                                    <span class="text-[7px] px-1.5 py-0.5 rounded bg-white/5 ${isCommission ? 'text-red-500' : 'text-zinc-500'} uppercase font-black w-fit border border-white/5 mb-1">
                                        ${category}
                                    </span>
                                    <span class="text-[8px] uppercase font-bold text-zinc-400 tracking-widest leading-none">Live in the Forge</span>
                                </div>
                                <span class="text-[10px] font-bold text-red-500">${progress}%</span>
                            </div>
                            <div class="w-full bg-black h-1 rounded-full overflow-hidden">
                                <div class="bg-red-600 h-full progress-glow transition-all duration-700" style="width: ${progress}%"></div>
                            </div>
                            <p class="text-[9px] text-zinc-300 uppercase font-semibold italic truncate">"${title}"</p>
                        </div>
                    `;
                    container.appendChild(cardWrapper);
                });

            } catch (e) { console.error("Sync failed:", e); }
        }
        syncForge();
    </script>
</body>
</html>
