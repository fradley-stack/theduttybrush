<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dutty Brush</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow-green { box-shadow: 0 0 8px #22c55e; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <main class="max-w-md w-full text-center space-y-6">
        <div class="space-y-4">
            <img src="https://res.cloudinary.com/dt9p8v9px/image/upload/v1740941910/370258169_122100806120038838_435017109249764516_n_p78i8u.jpg" 
                 class="w-24 h-24 rounded-full mx-auto border-2 border-red-600 object-cover shadow-lg shadow-red-600/20">
            <div>
                <h1 class="text-3xl font-black italic uppercase tracking-tighter">THE <span class="text-red-600">DUTTY</span> BRUSH</h1>
                <div class="flex items-center justify-center gap-2 mt-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full glow-green"></div>
                    <span class="text-[10px] uppercase font-bold tracking-widest text-zinc-400">Commissions Open</span>
                </div>
            </div>
        </div>

        <div class="grid gap-3">
            <a href="mailto:your-email@example.com" class="glass py-4 rounded-xl font-bold uppercase text-[10px] hover:bg-zinc-900 transition flex items-center px-6">
                <i class="fa-solid fa-envelope text-red-600 w-6 text-base"></i>
                <span class="flex-1">Request Quote</span>
            </a>
            <a href="https://www.facebook.com/profile.php?id=61582895284714" target="_blank" class="glass py-4 rounded-xl font-bold uppercase text-[10px] hover:bg-zinc-900 transition flex items-center px-6">
                <i class="fa-brands fa-facebook text-[#1877F2] w-6 text-base"></i>
                <span class="flex-1">Facebook</span>
            </a>
            <a href="https://instagram.com/duttyclem" target="_blank" class="glass py-4 rounded-xl font-bold uppercase text-[10px] hover:bg-zinc-900 transition flex items-center px-6">
                <i class="fa-brands fa-instagram text-[#E4405F] w-6 text-base"></i>
                <span class="flex-1">Instagram</span>
            </a>
            <a href="https://www.tiktok.com/@theduttybrush" target="_blank" class="glass py-4 rounded-xl font-bold uppercase text-[10px] hover:bg-zinc-900 transition flex items-center px-6">
                <i class="fa-brands fa-tiktok text-[#ff0050] w-6 text-base"></i>
                <span class="flex-1">TikTok</span>
            </a>
            <a href="hobby.html" class="bg-white text-black py-4 rounded-xl font-black uppercase text-[10px] hover:bg-red-600 hover:text-white transition shadow-xl">
                Enter Workbench
            </a>
        </div>

        <div id="forge-card" class="hidden glass p-5 rounded-2xl text-left space-y-3 border-l-4 border-l-zinc-800">
            <div class="flex justify-between items-end">
                <div class="flex flex-col gap-1">
                    <span id="p-tag" class="text-[8px] px-2 py-0.5 rounded font-black uppercase tracking-tighter border"></span>
                    <span class="text-[9px] uppercase font-bold text-zinc-500 tracking-widest">Live in the Forge</span>
                </div>
                <span id="p-percent" class="text-sm font-black text-red-600 italic">0%</span>
            </div>
            <div class="w-full bg-zinc-950 h-1.5 rounded-full overflow-hidden">
                <div id="p-bar" class="bg-red-600 h-full transition-all duration-1000" style="width: 0%"></div>
            </div>
            <p id="p-name" class="text-[10px] text-zinc-400 font-bold uppercase italic tracking-widest"></p>
        </div>
    </main>

    <script>
        async function init() {
            try {
                const r = await fetch('data.json?t=' + Date.now());
                const data = await r.json();
                const p = data[0];
                if(p) {
                    document.getElementById('forge-card').classList.remove('hidden');
                    document.getElementById('p-name').innerText = p.name;
                    document.getElementById('p-percent').innerText = p.percentage + '%';
                    document.getElementById('p-bar').style.width = p.percentage + '%';
                    const tag = document.getElementById('p-tag');
                    tag.innerText = p.type || "Personal";
                    tag.className = p.type === "Commission" 
                        ? "text-[8px] px-2 py-0.5 rounded font-black uppercase tracking-tighter border border-red-600/50 text-red-500 bg-red-500/5"
                        : "text-[8px] px-2 py-0.5 rounded font-black uppercase tracking-tighter border border-white/10 text-zinc-500 bg-white/5";
                }
            } catch(e) {}
        }
        init();
    </script>
</body>
</html>
