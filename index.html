    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; -webkit-font-smoothing: antialiased; }
        .hero-gradient { background: radial-gradient(circle at center, #111111 0%, #050505 100%); }
        .accent-red { color: #ff3e3e; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .status-dot { height: 6px; width: 6px; background-color: #22c55e; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #22c55e; }
        .avatar-glow { box-shadow: 0 0 30px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); }
        .progress-glow { box-shadow: 0 0 15px rgba(220, 38, 38, 0.4); }
        #toast { visibility: hidden; min-width: 200px; background-color: #ff3e3e; color: #fff; text-align: center; border-radius: 8px; padding: 12px; position: fixed; z-index: 1; bottom: 30px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>

        function showToast(msg) {
            const x = document.getElementById("toast");
            x.innerHTML = msg;
            x.className = "show";
            setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
        }

        function openDiscord() {
            window.open(`https://discord.com/users/${MY_DISCORD_ID}`, '_blank');
