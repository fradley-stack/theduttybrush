<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dutty Brush | Professional Miniature Painting</title>
    
    <link rel="icon" type="image/jpeg" href="avatar.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; }
        .hero-gradient { background: radial-gradient(circle at center, #111111 0%, #050505 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); transition: all 0.3s ease; }
        .glass-card:hover { border-color: rgba(255, 62, 62, 0.4); background: rgba(255, 255, 255, 0.05); }
        .accent-red { color: #ff3e3e; }
        label { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: #444; margin-bottom: 8px; display: block; }
    </style>
</head>
<body class="hero-gradient min-h-screen flex flex-col items-center p-6 py-12">

    <div class="text-center mb-10">
        <img src="avatar.jpg" class="w-24 h-24 rounded-full border-2 border-white/10 mx-auto mb-4" alt="Studio Logo">
        <h1 class="text-3xl font-900 uppercase italic tracking-tighter">The <span class="accent-red">Dutty</span> Brush</h1>
        <p class="text-zinc-500 text-xs uppercase tracking-[0.3em] mt-2">Miniature Painting Studio</p>
    </div>

    <div class="w-full max-w-[450px] space-y-4">
        
        <div class="glass-card p-6 rounded-3xl flex justify-between items-center">
            <div>
                <label class="mb-0">Current Studio Capacity</label>
                <p class="text-xs text-zinc-500 uppercase font-bold">Commission Slots Available</p>
            </div>
            <div class="text-right">
                <span id="active-count" class="text-3xl font-900 italic accent-red">--</span>
            </div>
        </div>

        <div id="live-workbench" class="glass-card p-6 rounded-3xl hidden">
            <div class="flex justify-between items-center mb-4">
                <label class="mb-0">Live Workbench</label>
                <span class="flex h-2 w-2 rounded-full bg-red-600 animate-pulse"></span>
            </div>
            <div id="feed-container" class="space-y-4">
                </div>
            <a href="hobby.html" class="block text-center mt-4 text-[9px] font-900 uppercase tracking-widest text-zinc-600 hover:text-white transition">View Full Registry</a>
        </div>

        <a href="mailto:info@theduttybrush.com" class="block glass-card p-5 rounded-2xl text-center font-900 uppercase italic tracking-widest text-sm hover:scale-[1.02]">
            Contact Me
        </a>
        
        <a href="hobby.html" class="block glass-card p-5 rounded-2xl text-center font-900 uppercase italic tracking-widest text-sm border-white/20 hover:scale-[1.02]">
            Enter Workbench
        </a>

        <div class="grid grid-cols-2 gap-4">
            <a href="https://thebaselair.com/duttyclem" target="_blank" class="glass-card p-4 rounded-2xl text-center">
                <span class="block text-[10px] font-900 uppercase tracking-widest">Baselair</span>
            </a>
            <a href="https://instagram.com/duttyclem" target="_blank" class="glass-card p-4 rounded-2xl text-center">
                <span class="block text-[10px] font-900 uppercase tracking-widest">Instagram</span>
            </a>
            <a href="https://tiktok.com/@theduttybrush" target="_blank" class="glass-card p-4 rounded-2xl text-center">
                <span class="block text-[10px] font-900 uppercase tracking-widest">TikTok</span>
            </a>
            <a href="https://www.facebook.com/profile.php?id=61582895284714" target="_blank" class="glass-card p-4 rounded-2xl text-center">
                <span class="block text-[10px] font-900 uppercase tracking-widest">Facebook</span>
            </a>
        </div>

        <div class="pt-8 text-center">
            <label>Service Tiers</label>
            <p class="text-[10px] text-zinc-600 font-bold uppercase tracking-widest">Tabletop • Tabletop Plus • Display • Character</p>
        </div>

    </div>

    <footer class="mt-20 text-center">
        <p class="text-[9px] font-black uppercase tracking-[0.4em] text-zinc-800">System v2.1.0-Forge</p>
    </footer>

    <script>
        async function init() {
            try {
                const res = await fetch('data.json?v=' + Date.now());
                const data = await res.json();
                
                // Count active slots (projects not archived)
                const active = data.filter(p => p.status !== 'archived').length;
                document.getElementById('active-count').innerText = active.toString().padStart(2, '0');
                
                // Live Feed
                const activeProjects = data.filter(p => p.status !== 'archived' && p.progress < 100).slice(0, 2);
                if(activeProjects.length > 0) {
                    const feedCont = document.getElementById('feed-container');
                    document.getElementById('live-workbench').classList.remove('hidden');
                    feedCont.innerHTML = '';
                    activeProjects.forEach(p => {
                        feedCont.innerHTML += `
                            <div class="flex items-center gap-4">
                                <img src="${p.thumbnail}" class="w-12 h-12 rounded-lg object-cover border border-white/10">
                                <div class="flex-grow">
                                    <div class="flex justify-between mb-1">
                                        <span class="text-[10px] font-900 uppercase italic">${p.title || p.name}</span>
                                        <span class="text-[9px] font-black text-zinc-600">${p.progress}%</span>
                                    </div>
                                    <div class="w-full h-[2px] bg-white/5 rounded-full overflow-hidden">
                                        <div class="bg-red-600 h-full" style="width: ${p.progress}%"></div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (err) { console.error(err); }
        }
        init();
    </script>
</body>
</html>
