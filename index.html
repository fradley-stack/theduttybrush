                <span id="progress-text" class="text-[10px] font-bold text-red-500">0%</span>
            </div>
            <div class="w-full bg-black h-1 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-red-600 h-full progress-glow transition-all duration-700" style="width: 0%"></div>
            </div>
            <p id="project-name" class="text-[9px] text-zinc-400 uppercase font-semibold italic">Current Project</p>
        </div>

            <span class="text-zinc-800">|</span>
            <span class="text-zinc-700">v2.1.0-Forge</span>
        </div>
    </footer>

    <script>
        async function syncForge() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                const data = await res.json();
                const active = data[0];
                if (active) {
                    document.getElementById('forge-card').classList.remove('hidden');
                    document.getElementById('project-name').innerText = `Current: "${active.name}"`;
                    document.getElementById('progress-text').innerText = `${active.percentage}%`;
                    document.getElementById('progress-bar').style.width = `${active.percentage}%`;
                    const tag = document.getElementById('project-tag');
                    tag.innerText = active.type || "Personal";
                    if (active.type === "Commission") tag.classList.add('text-red-500');
                }
            } catch (e) { console.log("Forge sync skipped."); }
        }
        syncForge();
    </script>
