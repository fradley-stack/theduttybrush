        .hero-gradient { background: radial-gradient(circle at center, #111111 0%, #050505 100%); }
        .accent-red { color: #ff3e3e; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .status-dot { height: 6px; width: 6px; background-color: #22c55e; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #22c55e; }
        .avatar-glow { box-shadow: 0 0 30px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); }
        .progress-glow { box-shadow: 0 0 15px rgba(220, 38, 38, 0.4); }
        .icon-container { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
        #toast { visibility: hidden; min-width: 200px; background-color: #ff3e3e; color: #fff; text-align: center; border-radius: 8px; padding: 12px; position: fixed; z-index: 1; bottom: 30px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; left: 50%; transform: translateX(-50%); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>

            </div>
            <div class="w-full bg-black h-1 rounded-full overflow-hidden">

                <span class="text-[10px] uppercase font-bold tracking-[0.4em] border-b border-zinc-900 hover:border-red-600 pb-1">dom@theduttybrush.com</span>

    <script>
        function showToast(msg) {
            const x = document.getElementById("toast");
            x.innerHTML = msg; x.className = "show";
            setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
        }

        function copyEmail() {
            navigator.clipboard.writeText("dom@theduttybrush.com");
            showToast("Email Copied");
        }

        async function syncForge() {
            try {
                const response = await fetch('data.json?t=' + Date.now());
                if (!response.ok) return;
                const projects = await response.json();
                const active = projects[0];

                if (active) {
                    document.getElementById('forge-card').classList.remove('hidden');
                    document.getElementById('project-name').innerText = `Current: "${active.name}"`;
                    document.getElementById('progress-text').innerText = `${active.percentage}%`;
                    document.getElementById('progress-bar').style.width = `${active.percentage}%`;
                    
                    const tag = document.getElementById('project-tag');
                    tag.innerText = active.type || "Personal";
                    if (active.type === "Commission") {
                        tag.classList.add('text-red-500', 'border-red-500/20');
                    }
                }
            } catch (err) { console.log("Forge silent fail."); }
        }
        syncForge();
    </script>
