<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dutty Brush | Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; }
        .hero-gradient { background: radial-gradient(circle at center, #111111 0%, #050505 100%); }
        .accent-red { color: #ff3e3e; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .status-dot { height: 6px; width: 6px; background-color: #22c55e; border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 10px #22c55e; }
        .avatar-glow { box-shadow: 0 0 25px rgba(255, 62, 62, 0.1); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="hero-gradient min-h-screen flex flex-col items-center justify-center p-6 text-white">

    <script>
        const MY_EMAIL = "dom@theduttybrush.com"; 
        const MY_DISCORD_ID = "1118558966377623582"; 

        const commissionBody = `Project Name: %0D%0AModel Scale: %0D%0AQuantity: %0D%0AStandard: Tabletop / Tabletop+ / Display %0D%0ADeadline:`;
        const commissionLink = `mailto:${MY_EMAIL}?subject=Commission Inquiry - The Dutty Brush&body=${commissionBody}`;
        const discordLink = `https://discord.com/users/${MY_DISCORD_ID}`;

        function openDiscord() {
            window.open(discordLink, '_blank');
        }
    </script>

    <main class="max-w-md w-full text-center space-y-8">
        <div class="space-y-6">
            <div class="relative inline-block">
                <img src="avatar.jpg" alt="Duttyclem" class="w-24 h-24 rounded-full mx-auto avatar-glow object-cover bg-zinc-900">
            </div>
            
            <div class="space-y-1">
                <h1 class="text-4xl font-900 uppercase tracking-tighter italic">
                    THE <span class="accent-red">DUTTY</span> BRUSH
                </h1>
                <div class="flex items-center justify-center">
                    <a href="#" onclick="window.location.href=commissionLink; return false;" class="flex items-center hover:opacity-80 transition-all transform hover:scale-105">
                        <span class="status-dot animate-pulse"></span>
                        <span class="text-[8px] uppercase font-bold tracking-[0.2em] text-zinc-500 border-b border-zinc-800 hover:border-zinc-500 pb-0.5">Commissions Open</span>
                    </a>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-3">
            <a href="https://www.tiktok.com/@theduttybrush" target="_blank" class="glass-card py-4 rounded-xl hover:bg-zinc-900 transition text-[10px] font-bold uppercase tracking-[0.2em]">TikTok</a>
            <a href="https://instagram.com/duttyclem" target="_blank" class="glass-card py-4 rounded-xl hover:bg-zinc-900 transition text-[10px] font-bold uppercase tracking-[0.2em]">Instagram</a>
            <a href="https://thebaselair.com/duttyclem" target="_blank" class="glass-card py-4 rounded-xl hover:bg-zinc-900 transition text-[10px] font-bold uppercase tracking-[0.2em]">Baselair</a>
            <a href="https://www.facebook.com/profile.php?id=61582895284714" target="_blank" class="glass-card py-4 rounded-xl hover:bg-zinc-900 transition text-[10px] font-bold uppercase tracking-[0.2em]">Facebook</a>
            
            <button onclick="openDiscord()" class="glass-card py-4 rounded-xl hover:bg-zinc-900 transition text-[10px] font-bold uppercase tracking-[0.2em] w-full">
                Message on Discord
            </button>

            <a href="hobby.html" class="mt-4 bg-white text-black py-4 rounded-xl text-[10px] font-900 uppercase tracking-[0.3em] hover:bg-red-600 hover:text-white transition-all transform hover:scale-[1.02] active:scale-95 shadow-xl shadow-white/5">
                Workbench
            </a>
        </div>

        <div class="pt-6">
            <a href="#" onclick="window.location.href=`mailto:${MY_EMAIL}`; return false;" class="text-zinc-600 hover:text-white transition-colors duration-300">
                <span class="text-[10px] uppercase font-bold tracking-[0.4em] border-b border-zinc-900 hover:border-red-600 pb-1">Email Inquiry</span>
            </a>
        </div>
    </main>

    <footer class="mt-20 opacity-20">
        <p class="text-[7px] uppercase tracking-[0.8em]">The Dutty Brush Studio // 2026</p>
    </footer>

</body>
</html>
