<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dutty Brush | Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .red-glow { box-shadow: 0 0 20px rgba(220, 38, 38, 0.4); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <main class="max-w-md w-full text-center space-y-8">
        <div class="space-y-2">
            <h1 class="text-5xl font-black italic uppercase tracking-tighter leading-none">THE <span class="text-red-600">DUTTY</span> BRUSH</h1>
            <p class="text-[9px] uppercase tracking-[0.4em] text-zinc-500 font-bold">Grimdark Miniature Studio</p>
        </div>

        <div id="featured-area" class="hidden space-y-4">
            <div class="glass rounded-3xl overflow-hidden aspect-square border-white/5 relative">
                <img id="feat-img" src="" class="w-full h-full object-cover">
                <div class="absolute bottom-4 left-4"><span class="text-[8px] font-black uppercase bg-red-600 px-3 py-1 rounded-full">Current Work</span></div>
            </div>

            <div class="glass p-6 rounded-3xl text-left space-y-4 border-l-4 border-l-zinc-800">
                <div class="flex justify-between items-end">
                    <div class="flex flex-col gap-1">
                        <span id="p-tag" class="text-[8px] px-2 py-0.5 rounded font-black uppercase tracking-tighter border"></span>
                        <span class="text-[9px] uppercase font-bold text-zinc-500 tracking-widest">Live in the Forge</span>
                    </div>
                    <span id="p-percent" class="text-lg font-black text-red-600 italic">0%</span>
                </div>
                <div class="w-full bg-zinc-950 h-2 rounded-full overflow-hidden">
                    <div id="p-bar" class="bg-red-600 h-full red-glow transition-all duration-1000" style="width: 0%"></div>
                </div>
                <p id="p-name" class="text-[11px] text-zinc-300 font-bold uppercase italic tracking-[0.1em]"></p>
            </div>
        </div>

        <div class="grid gap-3">
            <a href="mailto:your-email@example.com" class="bg-red-600 text-white py-4 rounded-xl font-black uppercase text-xs hover:bg-red-700 transition shadow-lg">Contact for Commissions</a>
            
            <a href="hobby.html" class="glass py-4 rounded-xl font-bold uppercase text-[10px] hover:bg-zinc-900 transition">Enter Workbench</a>
            
            <div class="flex gap-3">
                <a href="https://www.facebook.com/profile.php?id=61582895284714" target="_blank" class="flex-1 glass py-4 rounded-xl font-bold uppercase text-[9px] hover:bg-zinc-900 transition">Facebook</a>
                <a href="https://instagram.com/duttyclem" target="_blank" class="flex-1 glass py-4 rounded-xl font-bold uppercase text-[9px] hover:bg-zinc-900 transition">Instagram</a>
            </div>
        </div>
    </main>

    <script>
        async function init() {
            try {
                const r = await fetch('data.json?t=' + Date.now());
                const data = await r.json();
                const p = data[0];
                if(p) {
                    document.getElementById('featured-area').classList.remove('hidden');
                    document.getElementById('feat-img').src = p.image;
                    document.getElementById('p-name').innerText = p.name;
                    document.getElementById('p-percent').innerText = p.percentage + '%';
                    document.getElementById('p-bar').style.width = p.percentage + '%';
                    
                    const tag = document.getElementById('p-tag');
                    tag.innerText = p.type || "Personal";
                    tag.className = p.type === "Commission" 
                        ? "text-[8px] px-2 py-0.5 rounded font-black uppercase tracking-tighter border border-red-600/50 text-red-500 bg-red-500/5"
                        : "text-[8px] px-2 py-0.5 rounded font-black uppercase tracking-tighter border border-white/10 text-zinc-500 bg-white/5";
                }
            } catch(e) {}
        }
        init();
    </script>
</body>
</html>
