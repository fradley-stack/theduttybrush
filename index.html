<div id="forge-card" class="glass-card p-5 rounded-xl border border-zinc-800/50 text-left space-y-3 mt-4 hidden">
                <div class="flex justify-between items-end">
                    <div class="flex flex-col gap-1">
                        <span id="project-type" class="text-[7px] px-1.5 py-0.5 rounded bg-zinc-800 text-zinc-400 uppercase font-bold w-fit tracking-tighter"></span>
                        <span class="text-[8px] uppercase font-bold text-zinc-600 tracking-widest">Live in the Forge</span>
                    </div>
                    <span id="progress-text" class="text-[10px] font-bold text-red-500 tracking-tighter">0%</span>
                </div>
                <div class="w-full bg-black h-1 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-red-600 h-full progress-glow transition-all duration-1000" style="width: 0%"></div>
                </div>
                <p id="project-name" class="text-[9px] text-zinc-400 uppercase tracking-widest font-semibold italic">Loading current project...</p>
            </div>

<script>
    // Fetch the latest project from your data.json
    async function updateForge() {
        try {
            const response = await fetch('data.json'); // Ensure path is correct
            const data = await response.json();
            const latest = data[0]; // Gets the most recent entry

            if (latest) {
                document.getElementById('forge-card').classList.remove('hidden');
                document.getElementById('project-name').innerText = `Current: "${latest.name}"`;
                document.getElementById('progress-text').innerText = `${latest.percentage}%`;
                document.getElementById('progress-bar').style.width = `${latest.percentage}%`;
                
                // Set the Type Tag
                const typeEl = document.getElementById('project-type');
                typeEl.innerText = latest.type || "Personal";
                typeEl.style.color = latest.type === "Commission" ? "#ff3e3e" : "#a1a1aa";
            }
        } catch (e) {
            console.error("Forge Error: Check your data.json formatting.", e);
        }
    }
    updateForge();
</script>
